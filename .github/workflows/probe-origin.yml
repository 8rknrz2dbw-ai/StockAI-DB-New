name: 探測產地價資料集（一次性）

# 沙盒擋 data.moa.gov.tw，故用 Actions（有外網）掃國家/農業部開放平台有無「產地價」開放資料集。
# 手動觸發，跑完把 origin_probe.json commit 回 main 供判讀；判讀完可刪本 workflow 與 probe 檔。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 探測產地價資料集
        run: python3 scripts/probe_origin.py || echo "probe 失敗，保留 log"
      - name: 提交探測結果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add origin_probe.json || true
          if git diff --staged --quiet; then
            echo "無 origin_probe.json 變更"
          else
            git commit -m "chore: 產地價資料集探測結果 [skip ci]"
            ok=0
            for i in 1 2 3 4 5; do
              if git push origin HEAD:main; then ok=1; break; fi
              git fetch origin main; git rebase origin/main || git rebase --abort; sleep $((i*3))
            done
            [ "$ok" = 1 ] || { echo "::error::push 連續失敗"; exit 1; }
          fi
