<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
<title>巡田水</title>
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#12160E" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="巡田水" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root{ font-size:19px; }
  :root[data-fs="s"]{ font-size:16px; } :root[data-fs="m"]{ font-size:19px; }
  :root[data-fs="l"]{ font-size:23px; } :root[data-fs="xl"]{ font-size:28px; }
  :root{
    --bg:#12160E; --panel:#1B2015; --panel2:#232A1B; --line:#313A22;
    --leaf:#A6C955; --leaf-dim:#6E8F3C; --paper:#EFEAD8; --muted:#9aa27a;
    --g:#7CC24A; --y:#F2B705; --o:#E8862E; --r:#E4572E; --cool:#6FB0A6;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--paper);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;}
  .mono{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  :focus-visible{outline:3px solid var(--leaf);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  .wrap{max-width:760px;margin:0 auto;
    padding:calc(0.9rem + env(safe-area-inset-top)) calc(0.8rem + env(safe-area-inset-right)) 3rem calc(0.8rem + env(safe-area-inset-left));}

  header{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;padding-bottom:0.7rem;border-bottom:1px solid var(--line);}
  header h1{font-size:1.6rem;font-weight:900;margin:0;letter-spacing:3px;line-height:1.1;
    background:linear-gradient(96deg,#6DB33F 0%,#E4F4A8 28%,#7FD0C4 58%,#6DB33F 100%);background-size:220% 100%;
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
    filter:drop-shadow(0 1px 6px rgba(124,194,74,.5));animation:hsheen 7s linear infinite;}
  @keyframes hsheen{to{background-position:220% 0;}}
  .gear{background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    width:2.4rem;height:2.4rem;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .hgroup{margin-left:auto;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;justify-content:flex-end;}
  .upd{font-size:0.72rem;color:var(--muted);white-space:nowrap;}
  header.slim{gap:0.5rem;padding-top:0.1rem;} header.slim .upd{margin-right:auto;}
  .badge{padding:0.15rem 0.55rem;border-radius:999px;font-size:0.7rem;font-weight:700;border:1px solid var(--line);white-space:nowrap;}
  .badge.demo{color:var(--y);border-color:#5a4d13;background:#231d07;}
  .badge.live{color:var(--leaf);border-color:#2f4a1c;background:#182312;}

  .tabs{display:flex;gap:0.4rem;margin:0.9rem 0;}
  .tab{flex:1;background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:0.65rem 0.3rem;border-radius:999px;font-size:0.95rem;font-weight:800;}
  .tab.on{color:var(--bg);background:var(--leaf);border-color:var(--leaf);}
  .view{display:none;} .view.on{display:block;}

  /* 行情 */
  .mkt-label{font-size:0.8rem;color:var(--muted);margin:0.2rem 0 0.6rem;}
  .mkt-label b{color:var(--paper);}
  .board{display:flex;flex-direction:column;gap:0.55rem;}
  .prow{display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:0.8rem 0.9rem;text-align:left;color:inherit;width:100%;}
  .prow.on{box-shadow:inset 4px 0 0 var(--leaf);background:var(--panel2);}
  .prow .dot{width:0.7rem;height:0.7rem;border-radius:50%;flex:0 0 auto;}
  .prow .dot.up{background:var(--r);} .prow .dot.dn{background:var(--g);} .prow .dot.mid{background:var(--y);}
  .prow .nm{font-size:1.1rem;font-weight:800;}
  .prow .px{margin-left:auto;text-align:right;white-space:nowrap;}
  .prow .px .v{font-size:1.5rem;font-weight:900;}
  .prow .px .u{font-size:0.68rem;color:var(--muted);}
  .prow .chev{color:var(--muted);font-size:1rem;flex:0 0 auto;}
  .tag{font-size:0.72rem;font-weight:800;padding:0.18rem 0.55rem;border-radius:999px;white-space:nowrap;
    border:1px solid transparent;display:inline-flex;align-items:center;gap:0.3rem;}
  .tag::before{content:"";width:0.42rem;height:0.42rem;border-radius:50%;background:currentColor;flex:0 0 auto;}
  .tag.up{color:#F0906B;background:rgba(228,87,46,.15);border-color:rgba(228,87,46,.38);}
  .tag.dn{color:#83CE7E;background:rgba(95,184,90,.15);border-color:rgba(95,184,90,.38);}
  .tag.mid{color:#EBC44E;background:rgba(242,183,5,.14);border-color:rgba(242,183,5,.34);}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:var(--radius);padding:1.2rem;text-align:center;color:var(--muted);font-size:0.9rem;}
  /* 跨市場比價 */
  .cmprow{display:flex;align-items:center;gap:0.6rem;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:0.75rem 0.9rem;margin-top:0.5rem;}
  .cmprow.cheap{border-color:var(--leaf-dim);background:var(--panel2);}
  .cmprow .rk{width:1.4rem;text-align:center;color:var(--muted);font-weight:800;flex:0 0 auto;}
  .cmprow .mk{font-weight:800;font-size:1.05rem;} .cmprow .mk small{color:var(--muted);font-weight:400;font-size:.68rem;display:block;}
  .cmprow .pv{margin-left:auto;font-size:1.35rem;font-weight:900;} .cmprow .pu{font-size:.65rem;color:var(--muted);}
  .cmprow .best{font-size:.68rem;font-weight:800;color:#0e1a08;background:var(--g);padding:.12rem .5rem;border-radius:999px;flex:0 0 auto;}

  /* 股票式查價卡 */
  .quote{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;
    transition:transform .32s cubic-bezier(.34,1.32,.64,1),opacity .24s;will-change:transform;}
  .quote .grab{width:2.6rem;height:0.28rem;border-radius:999px;background:var(--line);margin:-0.3rem auto 0.5rem;}
  /* 收合後的迷你查價條（可點開） */
  .qmini{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:0.7rem 1rem;display:flex;align-items:baseline;gap:0.35rem 0.5rem;flex-wrap:wrap;cursor:pointer;
    transition:transform .32s cubic-bezier(.34,1.32,.64,1),opacity .24s;will-change:transform;}
  .qmini .mnm{font-weight:900;font-size:1.15rem;white-space:nowrap;} .qmini .mpx{font-size:1.5rem;font-weight:900;white-space:nowrap;}
  .qmini .mpx.up{color:var(--r);} .qmini .mpx.dn{color:var(--g);} .qmini .mpx.mid{color:var(--paper);}
  .qmini .mu{font-size:0.7rem;color:var(--muted);} .qmini .mchg{font-size:0.85rem;font-weight:800;white-space:nowrap;}
  .qmini .mchg.up{color:var(--r);} .qmini .mchg.dn{color:var(--g);} .qmini .mchg.mid{color:var(--y);}
  .qmini .mhint{margin-left:auto;font-size:0.8rem;color:var(--leaf);white-space:nowrap;flex:0 0 auto;}
  .quote h3{margin:0;font-size:1.3rem;font-weight:900;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
  .quote .mktbadge{margin-left:auto;font-size:1.1rem;font-weight:900;color:var(--bg);background:var(--leaf);
    padding:0.25rem 0.8rem;border-radius:999px;white-space:nowrap;}
  .quote .price{display:flex;align-items:baseline;gap:0.5rem;margin-top:0.3rem;flex-wrap:wrap;}
  .quote .price .v{font-size:2.4rem;font-weight:900;line-height:1;}
  .quote .price .v.up{color:var(--r);} .quote .price .v.dn{color:var(--g);} .quote .price .v.mid{color:var(--paper);}
  .quote .price .u{font-size:0.75rem;color:var(--muted);}
  .quote .chg{font-size:0.95rem;font-weight:800;}
  .quote .chg.up{color:var(--r);} .quote .chg.dn{color:var(--g);} .quote .chg.mid{color:var(--y);}
  .quote .ohlc{display:flex;flex-wrap:wrap;gap:0.4rem 1.2rem;margin-top:0.6rem;font-size:0.82rem;color:var(--muted);}
  .quote .ohlc b{color:var(--paper);font-weight:800;}
  .qchart{margin-top:0.6rem;position:relative;} .qchart svg{width:100%;height:7.5rem;display:block;touch-action:none;}
  .qchart .cap{font-size:0.7rem;color:var(--muted);margin-top:0.25rem;}
  /* 查價線標籤（右側價格、底部日期），用 HTML 疊在圖上避免 SVG 拉伸變形 */
  .axlabel{position:absolute;font-size:0.72rem;font-weight:800;padding:0.05rem 0.35rem;border-radius:6px;
    pointer-events:none;white-space:nowrap;z-index:2;display:none;}
  .axlabel.px{background:var(--paper);color:#12160E;right:2px;transform:translateY(-50%);}
  .axlabel.dt{background:var(--panel2);color:var(--paper);border:1px solid var(--line);bottom:0;transform:translateX(-50%);}
  .tfrow{display:flex;gap:0.35rem;margin-top:0.6rem;}
  .tfrow button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:0.35rem 0.8rem;border-radius:8px;font-weight:800;font-size:0.85rem;}
  .tfrow button.on{background:var(--leaf);color:var(--bg);border-color:var(--leaf);}
  .qtip{font-size:0.82rem;color:var(--paper);margin-top:0.45rem;min-height:1.3rem;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:0.4rem 0.6rem;}
  .qtip b{color:var(--leaf);} .qtip .ev{color:var(--cool);font-weight:700;}
  /* 分類（蔬菜/水果）切換：在品項清單正上方、與凍結查價卡同區 */
  .catbar{display:flex;gap:0.5rem;margin:0.7rem 0 0.6rem;}
  .catbar button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:0.65rem;border-radius:12px;font-weight:900;font-size:1.15rem;}
  .catbar button.on{background:var(--leaf);color:var(--bg);border-color:var(--leaf);}
  .mkt-top{position:sticky;top:0;z-index:6;background:var(--bg);padding-top:0.2rem;margin-bottom:0.5rem;border-bottom:1px solid var(--line);}
  /* 圖表自動事件註記（為什麼暴漲/暴跌） */
  .annos{margin-top:0.5rem;display:flex;flex-direction:column;gap:0.3rem;}
  .annohd{font-size:0.75rem;color:var(--muted);font-weight:800;margin-bottom:0.1rem;}
  .anno{display:flex;align-items:center;gap:0.45rem;font-size:0.82rem;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:0.35rem 0.55rem;}
  .anno .ae{font-size:1.05rem;flex:0 0 auto;} .anno .ad{color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .anno .al{font-weight:700;} .anno .ap{margin-left:auto;font-weight:900;flex:0 0 auto;}
  .anno .ap.up{color:var(--r);} .anno .ap.dn{color:var(--g);}
  .tag.season{color:#8FC7BD;background:rgba(111,176,166,.14);border-color:rgba(111,176,166,.34);}

  /* === 行情看板 v1.2：大卡列表 + 點進去的詳細頁 === */
  .boardtop{position:sticky;top:0;z-index:6;background:var(--bg);padding:0.2rem 0 0.6rem;
    display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.7rem;}
  .boardtop .catbar{margin:0;}
  .mktrow{display:flex;align-items:center;gap:0.6rem;}
  .mktlabel{font-size:0.95rem;color:var(--muted);font-weight:600;white-space:nowrap;}
  .mktlabel b{color:var(--leaf);font-weight:900;}
  .unitbar{margin-left:auto;flex:0 0 auto;}
  .unitseg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:2px;flex:0 0 auto;}
  .unitseg button{background:transparent;border:0;color:var(--muted);padding:0.42rem 0.9rem;border-radius:999px;font-weight:800;font-size:0.9rem;}
  .unitseg button.on{background:var(--leaf);color:var(--bg);}
  .mcard{display:flex;flex-direction:column;gap:0.4rem;width:100%;text-align:left;color:var(--paper);
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:0.9rem 1rem;margin-bottom:0.6rem;overflow:hidden;}
  .mcard:active{background:var(--panel2);}
  .mc-r1,.mc-r2{display:flex;align-items:center;gap:0.55rem;}
  .mcard .mc-dot{width:0.8rem;height:0.8rem;border-radius:50%;flex:0 0 auto;}
  .mcard .mc-dot.up{background:var(--r);} .mcard .mc-dot.dn{background:var(--g);} .mcard .mc-dot.mid{background:var(--y);}
  .mcard .mc-nm{font-size:1.45rem;font-weight:900;letter-spacing:1px;min-width:0;line-height:1.15;}
  .mcard .mc-px{margin-left:auto;display:flex;align-items:baseline;gap:0.12rem;white-space:nowrap;flex:0 0 auto;}
  .mcard .mc-v{font-size:1.7rem;font-weight:900;} .mcard .mc-u{font-size:0.62rem;color:var(--muted);}
  .mcard .mc-tag{min-width:0;} .mcard .mc-tag .tag{white-space:normal;}
  .mcard .mc-chg{margin-left:auto;font-size:0.92rem;font-weight:800;white-space:nowrap;flex:0 0 auto;}
  .mcard .mc-chg.up{color:var(--r);} .mcard .mc-chg.dn{color:var(--g);} .mcard .mc-chg.mid{color:var(--muted);}
  .mcard .mc-none{color:var(--muted);font-size:0.95rem;margin-left:auto;}
  .mcard .chev{color:var(--muted);font-size:1.5rem;font-weight:400;flex:0 0 auto;}
  .dtl-bar{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.6rem;}
  .backbtn{background:var(--panel2);border:1px solid var(--line);color:var(--paper);font-weight:800;font-size:0.95rem;
    padding:0.45rem 0.95rem;border-radius:999px;}
  .dtl-bar .unitseg{margin-left:auto;}
  .dd-title{font-weight:900;font-size:1.05rem;margin:1.1rem 0 0.65rem;padding-left:0.6rem;border-left:4px solid var(--leaf);}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0.7rem 0.85rem;margin-bottom:0.55rem;}
  .dc-hd{font-size:0.76rem;color:var(--muted);margin-bottom:0.35rem;}
  .dc-main{display:flex;align-items:baseline;gap:0.4rem 0.9rem;flex-wrap:wrap;}
  .dc-main .dc-avg{font-size:0.82rem;color:var(--muted);}
  .dc-main .dc-avg b{font-size:1.45rem;font-weight:900;margin-left:0.25rem;}
  .dc-main .dc-avg b.up{color:var(--r);} .dc-main .dc-avg b.dn{color:var(--g);} .dc-main .dc-avg b.mid{color:var(--paper);}
  .dc-main .dc-chg{font-weight:800;font-size:0.9rem;}
  .dc-main .dc-chg.up{color:var(--r);} .dc-main .dc-chg.dn{color:var(--g);} .dc-main .dc-chg.mid{color:var(--muted);}
  .dc-main .dc-qty{margin-left:auto;font-size:0.8rem;color:var(--muted);}
  .dc-ohlc{display:flex;gap:0.5rem 1.3rem;margin-top:0.45rem;padding-top:0.4rem;border-top:1px dashed var(--line);
    font-size:0.84rem;color:var(--muted);flex-wrap:wrap;}
  .dc-ohlc b{color:var(--paper);font-weight:800;}
  /* 壓縮版面：對比常態＋日週月同列（tf 靠右） */
  .tfline{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
  .tfline .cmp{font-size:0.85rem;color:var(--muted);} .tfline .cmp b{color:var(--paper);}
  .tfline .tfrow{margin-top:0;}
  /* 為什麼漲跌：可折疊，省空間 */
  .annobox{margin-top:0.5rem;} .annobox>summary{cursor:pointer;font-size:0.8rem;color:var(--muted);font-weight:800;list-style:none;padding:0.35rem 0;}
  .annobox>summary::-webkit-details-marker{display:none;}
  .annobox>summary::before{content:"▸ ";} .annobox[open]>summary::before{content:"▾ ";}
  /* 角色買賣價註記 */
  .rolenote{margin-top:0.4rem;font-size:0.8rem;color:var(--muted);}
  .rolenote b{color:var(--paper);} .rolenote.farmer b{color:var(--leaf);} .rolenote.merchant b{color:var(--o);}
  /* 全品種行情（可折疊） */
  .varbox{margin-top:0.5rem;} .varbox>summary{cursor:pointer;font-size:0.82rem;color:var(--muted);font-weight:800;list-style:none;padding:0.35rem 0;}
  .varbox>summary::-webkit-details-marker{display:none;} .varbox>summary::before{content:"▸ ";} .varbox[open]>summary::before{content:"▾ ";}
  .varrow{display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:0.35rem 0.6rem;margin-top:0.3rem;}
  .varrow .vl{font-weight:700;} .varrow .vp{margin-left:auto;font-weight:900;font-size:1rem;} .varrow .vu{font-size:0.7rem;color:var(--muted);}
  /* 我的品項：勾選表（省空間、可勾選增刪） */
  .pickgrp{margin-top:0.4rem;} .pickh{font-size:0.85rem;color:var(--muted);font-weight:800;margin:0.35rem 0 0.25rem;}
  .pickgrid{display:flex;flex-wrap:wrap;gap:0.4rem;}
  .chip{display:inline-flex;align-items:center;gap:0.35rem;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:0.35rem 0.7rem;font-size:0.95rem;cursor:pointer;user-select:none;}
  .chip.on{background:var(--leaf-dim);color:var(--bg);border-color:var(--leaf-dim);font-weight:800;}
  .chip input{width:1.05rem;height:1.05rem;accent-color:var(--leaf);margin:0;}

  /* 田區搶收 */
  .alert{border:1px solid #5a2c1f;border-radius:var(--radius);
    background:linear-gradient(90deg,rgba(228,87,46,.18),rgba(228,87,46,.05) 60%,transparent);
    padding:0.9rem 1rem;display:flex;flex-wrap:wrap;align-items:center;gap:0.3rem 1rem;margin-bottom:0.9rem;}
  .alert .ticon{font-size:2rem;line-height:1;flex:0 0 auto;filter:drop-shadow(0 0 7px rgba(228,87,46,.55));}
  .alert .ticon.spin{animation:tspin 4.5s linear infinite;} @keyframes tspin{to{transform:rotate(360deg);}}
  /* 颱風/暴雨警戒：半透明紅閃爍 */
  .alert.flash{animation:aflash 1.5s ease-in-out infinite;}
  @keyframes aflash{0%,100%{background:linear-gradient(90deg,rgba(228,87,46,.22),rgba(228,87,46,.06) 60%,transparent);border-color:#7a3320;}
    50%{background:linear-gradient(90deg,rgba(228,87,46,.46),rgba(228,87,46,.14) 55%,rgba(228,87,46,.03));border-color:#c14e2d;}}
  .alert.rain.flash{border-color:#26506e;}
  .alert.rain.flash{animation:rflash 1.6s ease-in-out infinite;}
  @keyframes rflash{0%,100%{background:linear-gradient(90deg,rgba(59,125,216,.20),rgba(59,125,216,.05) 60%,transparent);border-color:#26506e;}
    50%{background:linear-gradient(90deg,rgba(59,125,216,.42),rgba(59,125,216,.12) 55%,transparent);border-color:#3f79c9;}}
  .alert.rain .ticon{filter:drop-shadow(0 0 7px rgba(59,125,216,.6));}
  .alert.calm{border-color:#2f4a1c;background:linear-gradient(90deg,rgba(124,194,74,.14),transparent 60%);}
  .alert.track{border-color:#5a4d13;background:linear-gradient(90deg,rgba(242,183,5,.14),transparent 60%);}
  .alert.track .ticon{filter:drop-shadow(0 0 6px rgba(242,183,5,.5));}
  .alert.track .big b{color:var(--y);}
  .alert .big{font-size:1.02rem;font-weight:800;flex:1 1 60%;} .alert .big b{color:#F6C6B4;} .alert.calm .big b{color:var(--leaf);}
  .alert.rain .big b{color:#bcd8ff;}
  .alert .k{font-size:0.8rem;color:var(--muted);} .alert .k b{color:var(--paper);}

  .cards{display:flex;flex-direction:column;gap:0.7rem;}
  .fcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:0.9rem;position:relative;overflow:hidden;}
  .fcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--dec,var(--muted));}
  .fcard.dec-r{--dec:var(--r)} .fcard.dec-o{--dec:var(--o)} .fcard.dec-y{--dec:var(--y)} .fcard.dec-g{--dec:var(--g)}
  .fcard .ctop{display:flex;align-items:baseline;gap:0.5rem;flex-wrap:wrap;}
  .fcard .cid{font-size:1.1rem;font-weight:800;} .fcard .cid small{color:var(--muted);font-weight:400;font-size:0.75rem;}
  .fcard .pill{margin-left:auto;font-size:0.85rem;font-weight:800;padding:0.25rem 0.7rem;border-radius:999px;color:#12160E;background:var(--dec);white-space:nowrap;}
  .fcard .pill.dec-y{color:#2a2306;}
  .fcard .line{font-size:0.85rem;color:var(--muted);margin-top:0.4rem;}
  .fcard .line b.hi{color:var(--r);} .fcard .line b.mid{color:var(--o);} .fcard .line b.lo{color:var(--g);} .fcard .line b{color:var(--paper);}
  .count{margin-top:0.6rem;border:1px solid var(--line);border-radius:12px;padding:0.6rem 0.7rem;background:var(--panel2);}
  .count .cl{font-size:0.72rem;color:var(--muted);} .count .cd{font-size:1.8rem;font-weight:900;line-height:1.1;}
  .count.soon .cd{color:var(--r);animation:blink 1.1s steps(2,jump-none) infinite;}
  .count .cn{font-size:0.72rem;color:var(--muted);margin-top:0.15rem;} .count.none .cd{font-size:1rem;color:var(--muted);font-weight:700;}
  @keyframes blink{50%{opacity:.45}}
  .dilemma{margin-top:0.6rem;border:1px solid #6a5410;background:#241d06;border-radius:12px;padding:0.6rem 0.7rem;}
  .dilemma .dh{color:var(--y);font-weight:800;font-size:0.9rem;} .dilemma .dt{font-size:0.8rem;color:#e7dcb4;margin-top:0.25rem;}
  .oppo{margin-top:0.6rem;border:1px solid #2f4a4a;background:#0e1a1a;border-radius:12px;padding:0.6rem 0.7rem;}
  .oppo .oh{color:var(--cool);font-weight:800;font-size:0.9rem;} .oppo .ot{font-size:0.8rem;color:#cfe3df;margin-top:0.25rem;}

  /* 採收預判 */
  .form{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:0.8rem;}
  .form label{font-size:0.85rem;color:var(--muted);display:block;margin-bottom:0.3rem;}
  .form input,.form select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.6rem 0.7rem;border-radius:12px;font-size:1rem;}
  .form .go{background:var(--leaf);color:var(--bg);border:0;border-radius:12px;padding:0.7rem;font-size:1.05rem;font-weight:800;}
  .fcresult{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;}
  .fcresult h3{margin:0 0 0.4rem;font-size:1.1rem;}
  .fcresult .band{font-size:2rem;font-weight:900;} .fcresult .band .u{font-size:0.75rem;color:var(--muted);font-weight:400;}
  .fcresult .row{font-size:0.9rem;color:var(--muted);margin-top:0.4rem;} .fcresult .row b{color:var(--paper);}
  .fcresult .risk{margin-top:0.6rem;border-radius:12px;padding:0.6rem 0.7rem;font-size:0.85rem;}
  .fcresult .risk.warn{border:1px solid #6a5410;background:#241d06;color:#e7dcb4;}
  .fcresult .risk.ok{border:1px solid #2f4a1c;background:#182312;color:#d7e6bf;}

  .foot{margin-top:1.6rem;color:var(--muted);font-size:0.72rem;line-height:1.7;border-top:1px solid var(--line);padding-top:0.9rem;}

  /* 設定 sheet */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;align-items:flex-end;justify-content:center;}
  .modal.on{display:flex;}

  @media(min-width:520px){.modal{align-items:center;} .sheet{border-radius:20px;}}
  .sheet h2{margin:0 0 0.2rem;font-size:1.2rem;font-weight:900;display:flex;align-items:center;}
  .sheet .close{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--paper);width:2.1rem;height:2.1rem;border-radius:50%;font-size:1.1rem;}
  .setblk{margin-top:1.2rem;} .setblk h4{margin:0 0 0.5rem;font-size:0.95rem;color:var(--muted);font-weight:700;}
  .fsrow{display:flex;gap:0.5rem;}
  .fsrow button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.6rem 0.3rem;border-radius:12px;font-weight:800;}
  .fsrow button[data-v="s"]{font-size:0.85rem;} .fsrow button[data-v="m"]{font-size:1rem;} .fsrow button[data-v="l"]{font-size:1.2rem;} .fsrow button[data-v="xl"]{font-size:1.45rem;}
  .fsrow button.on{background:var(--leaf);color:var(--bg);border-color:var(--leaf);}

  select.mkt{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.65rem 0.7rem;border-radius:12px;font-size:1rem;}

  .listrow .sp{margin-left:auto;display:flex;gap:0.4rem;}
  .listrow .rm{background:transparent;border:1px solid #5a2c1f;color:var(--r);border-radius:999px;padding:0.2rem 0.7rem;font-size:0.8rem;font-weight:800;}
  .listrow .ed{background:transparent;border:1px solid var(--line);color:var(--paper);border-radius:999px;padding:0.2rem 0.7rem;font-size:0.8rem;font-weight:800;}
  .addrow{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
  .addrow select{flex:1;min-width:8rem;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.55rem 0.6rem;border-radius:12px;font-size:0.95rem;}
  .addrow button{background:var(--leaf);color:var(--bg);border:0;border-radius:12px;padding:0.55rem 1rem;font-weight:800;}
  .addrow button:disabled{opacity:.4;}
  .fieldform{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:0.7rem;margin-top:0.5rem;display:none;flex-direction:column;gap:0.55rem;}
  .fieldform.on{display:flex;}
  .fieldform label{font-size:0.78rem;color:var(--muted);}
  .fieldform input,.fieldform select{width:100%;min-width:0;box-sizing:border-box;background:var(--panel);border:1px solid var(--line);color:var(--paper);padding:0.5rem 0.6rem;border-radius:10px;font-size:0.95rem;}
  .fieldform input[type=date]{-webkit-appearance:none;appearance:none;}
  .fieldform .frow{display:flex;gap:0.5rem;} .fieldform .frow>div{flex:1;min-width:0;}
  .fieldform .save{background:var(--leaf);color:var(--bg);border:0;border-radius:10px;padding:0.6rem;font-weight:800;}
  .gpsbtn{width:100%;background:var(--panel);border:1px solid var(--leaf-dim);color:var(--leaf);border-radius:10px;padding:0.5rem;font-weight:700;margin-top:0.35rem;}
  .fieldform a{color:var(--leaf);}

<body>

  </div>

    字體大小、市場、品項、<b>你的田區（新增/刪除）</b>都在右上齒輪 ⚙️ 裡。

</div>

<div class="modal" id="modal">

      </div></div>

    <div class="setblk"><h4>果菜市場</h4><select class="mkt" id="mktSelect"></select></div>

        </div>

<script>
/* ══════ 基礎 ══════ */
const VERSION="v1.3";
function resolveGhBase(){const {origin,pathname,hostname}=location;
  if(hostname.endsWith("github.io")){const s=pathname.split("/").filter(Boolean);return origin+(s.length?"/"+s[0]:"");}return ".";}
function doyOf(iso){const [Y,M,D]=iso.split("-").map(Number);return Math.floor((Date.UTC(Y,M-1,D)-Date.UTC(Y,0,0))/86400000);}
function weekOf(iso){return Math.floor(doyOf(iso)/7);}
function median(a){if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);const m=s.length>>1;return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function pctile(a,p){if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);return s[Math.min(s.length-1,Math.floor(s.length*p))];}
function mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function pad(n){return String(n).padStart(2,"0");}
function todayISO(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function addDaysISO(iso,n){const [Y,M,D]=iso.split("-").map(Number);const d=new Date(Date.UTC(Y,M-1,D));d.setUTCDate(d.getUTCDate()+n);
  return d.getUTCFullYear()+"-"+pad(d.getUTCMonth()+1)+"-"+pad(d.getUTCDate());}
function daysBetween(a,b){return (Date.parse(b+"T00:00:00Z")-Date.parse(a+"T00:00:00Z"))/86400000;}

/* ══════ 作物農藝參數 ══════ */
const GROWTH={青江菜:[38,48],小白菜:[25,38],芥藍菜:[70,70],菠菜:[50,50],空心菜:[30,40],
  地瓜葉:[35,45],莧菜:[30,40],茼蒿:[40,50],油菜:[35,45],"萵苣(A菜)":[40,50],芥菜:[55,65]};
const MAT_MIN={青江菜:.75,小白菜:.7,芥藍菜:.75,菠菜:.75,空心菜:.7,地瓜葉:.7,莧菜:.7,茼蒿:.72,油菜:.72,"萵苣(A菜)":.75,芥菜:.75};
const V_CROP={青江菜:.95,小白菜:.95,芥藍菜:.8,菠菜:.85,空心菜:.7,地瓜葉:.65,莧菜:.85,茼蒿:.85,油菜:.85,"萵苣(A菜)":.9,芥菜:.8};
const FLOOD_ADV={1:0,2:0,3:12,4:18,5:24};
function isSummer(iso){const m=+iso.split("-")[1];return m>=5&&m<=10;}
function growthDays(crop,plantISO){const g=GROWTH[crop]||[35,45];return isSummer(plantISO)?g[0]:g[1];}
function cropList(){return Object.keys(GROWTH);}

/* ══════ 設定/儲存 ══════ */
const S={
  get fs(){return localStorage.getItem("vs_fs")||"l";}, set fs(v){localStorage.setItem("vs_fs",v);},
  get role(){return localStorage.getItem("vs_role")||"farmer";}, set role(v){localStorage.setItem("vs_role",v);},
  get market(){return localStorage.getItem("vs_market")||"";}, set market(v){localStorage.setItem("vs_market",v);},
  get unit(){return localStorage.getItem("vs_unit")||"kg";}, set unit(v){localStorage.setItem("vs_unit",v);},
  watch(mk){try{return JSON.parse(localStorage.getItem("vs_watch_"+mk));}catch(e){return null;}},
  setWatch(mk,a){localStorage.setItem("vs_watch_"+mk,JSON.stringify(a));},
  get fields(){try{const f=JSON.parse(localStorage.getItem("vs_fields"));return Array.isArray(f)?f:null;}catch(e){return null;}},
  setFields(a){localStorage.setItem("vs_fields",JSON.stringify(a));},
};
function applyFont(){document.documentElement.setAttribute("data-fs",S.fs);
  document.querySelectorAll("#fsRow button").forEach(b=>b.classList.toggle("on",b.dataset.v===S.fs));}
function seedFields(){return [
  {id:"A12",name:"A12 溪底田",crop:"青江菜",plant:addDaysISO(todayISO(),-22),flood:4,spray:addDaysISO(todayISO(),-3),phi:8},
  {id:"E09",name:"E09 高地",crop:"小白菜",plant:addDaysISO(todayISO(),-15),flood:1,spray:"",phi:0},
  {id:"C03",name:"C03 芥藍田",crop:"芥藍菜",plant:addDaysISO(todayISO(),-55),flood:3,spray:addDaysISO(todayISO(),-10),phi:3},
];}
function getFields(){let f=S.fields;if(!f){f=seedFields();S.setFields(f);}return f;}

/* ══════ 行情資料 ══════ */
let INDEX=null,MDATA={},MVAR={},MARKET="",CUR=null,WEATHER=null;
function marketNames(){return ((INDEX&&INDEX.markets)||[]).map(m=>m.name);}
function cropMap(){return (INDEX&&INDEX.crop_map)||{};}
/* 分類：蔬菜/水果（後端 prices_index.categories 提供；缺則用內建水果清單判斷） */
function cropCats(){return (INDEX&&INDEX.categories)||{};}
const FRUIT_FALLBACK=new Set(["香蕉","鳳梨","西瓜","木瓜","芒果","蓮霧","芭樂","番石榴","葡萄","柳丁","椪柑","火龍果","荔枝","龍眼","番茄","釋迦","梨","桃","李","柚","文旦","甜柿","棗","楊桃","哈密瓜","香瓜","荖葉","草莓","百香果","酪梨","蘋果"]);
function cropCat(disp){const c=cropCats()[disp];if(c)return c;for(const f of FRUIT_FALLBACK)if(disp.includes(f))return "水果";return "蔬菜";}
async function loadIndex(){
  try{const r=await fetch(`${resolveGhBase()}/prices_index.json`,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();if(!j||!j.crop_map||!Array.isArray(j.markets)||!j.markets.length)throw 0;
    j._live=true;return {index:j,live:true};}catch(e){return {index:demoIndex(),live:false};}}
async function loadMarket(mk){
  if(MDATA[mk])return MDATA[mk];
  const ent=((INDEX&&INDEX.markets)||[]).find(m=>m.name===mk);
  if(INDEX&&INDEX._live&&ent&&ent.file){
    try{const r=await fetch(`${resolveGhBase()}/${ent.file}`,{cache:"no-store"});
      if(r.ok){const j=await r.json();MDATA[mk]=(j&&j.data)||{};MVAR[mk]=(j&&j.variants)||{};return MDATA[mk];}}catch(e){}}
  MDATA[mk]=demoMarketData(mk);MVAR[mk]={};return MDATA[mk];}
async function loadWeather(){
  try{const r=await fetch(`${resolveGhBase()}/typhoon_status.json`,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();return (j&&typeof j==="object")?j:{active:false};}catch(e){return {active:false};}}
async function loadEvents(){
  // 真實天氣事件（颱風/大雨/低溫），由後端 fetch_cwa.py 逐日累積；抓不到就空、K線只顯示節慶/爆量
  try{const r=await fetch(`${resolveGhBase()}/weather_events.json`,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();const arr=Array.isArray(j)?j:(j&&j.events);if(!Array.isArray(arr))throw 0;
    const m={};arr.forEach(e=>{if(e&&e.date&&e.type){(m[e.date]=m[e.date]||[]).push(e);}});return m;}catch(e){return {};}}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ── 農曆（base=2020 正月初一；涵蓋 2020–2035，已對照參考行情/節氣校驗） ── */
const LUNAR={base:Date.UTC(2020,0,25),y0:2020,info:[
  0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
  0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0]};
function _lInfo(y){return LUNAR.info[y-LUNAR.y0];}
function _leapMonth(y){return _lInfo(y)&0xf;}
function _leapDays(y){return _leapMonth(y)?((_lInfo(y)&0x10000)?30:29):0;}
function _monthDays(y,m){return (_lInfo(y)&(0x10000>>m))?30:29;}
function _yearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1)s+=(_lInfo(y)&i)?1:0;return s+_leapDays(y);}
function toLunar(iso){const p=String(iso).split("-").map(Number);if(p.length<3)return null;
  let off=Math.round((Date.UTC(p[0],p[1]-1,p[2])-LUNAR.base)/86400000);
  if(off<0||p[0]<LUNAR.y0||p[0]>=LUNAR.y0+LUNAR.info.length)return null;
  let y=LUNAR.y0,t=0;while(y<LUNAR.y0+LUNAR.info.length){t=_yearDays(y);if(off<t)break;off-=t;y++;}
  const leap=_leapMonth(y);let isLeap=false,m=1,dm=0;
  for(m=1;m<13;m++){if(leap>0&&m===leap+1&&!isLeap){isLeap=true;m--;dm=_leapDays(y);}else dm=_monthDays(y,m);
    if(off<dm)break;off-=dm;if(isLeap&&m===leap+1)isLeap=false;}
  return {label:(isLeap?"閏":"")+m+"/"+(off+1)};}
const WEEKDAY=["日","一","二","三","四","五","六"];

/* 自動事件註記：挑出暴漲/暴跌，並找出「為什麼」（颱風/大雨/低溫/節慶/爆量） */
function eventCause(day,v,qmed){
  const win=TF==="D"?4:TF==="W"?11:31;
  let best=null,bd=1e9;
  for(const ed in WEVENTS){const dd=Math.abs(daysBetween(ed,day));if(dd<=win&&dd<bd){bd=dd;const a=WEVENTS[ed][0];best={g:(WEV_STYLE[a.type]||{}).g||"⚑",label:a.label||a.type};}}
  if(best)return best;
  for(const [fd,name] of FESTIVALS){const dd=Math.abs(daysBetween(fd,day));if(dd<=win)return {g:"🔹",label:name+"前後"};}
  if(TF==="D"&&qmed&&v.qty>qmed*1.8)return {g:"🔺",label:"爆量壓價"};
  return null;
}
function annotate(d){

    out.push({i,date:d[i][0],pct,g:c.g,label:c.label});}
  out.sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));return out.slice(0,3);
}

/* 均價折線 + 漸層面積 + 高低區間帶（乾淨好看），查價線由 attachCross 疊上 */

function attachCross(box){
  const svg=box.querySelector("#qchart svg");if(!svg||!QGEO||!QDATA.length)return;

/* ══════ 田區搶收（前端即時計算） ══════ */
const DECC={NOW:"r",ADVISED:"o",WATCH:"y",NORMAL:"g"};const DECT={NOW:"立即搶收",ADVISED:"建議搶收",WATCH:"觀望",NORMAL:"照常"};
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
/* 以「田區座標」算侵襲機率：用 typhoon_status.track（各預報時刻位置＋暴風圈半徑）逐點比對 */
function haversineKm(la1,lo1,la2,lo2){const R=6371,p1=la1*Math.PI/180,p2=la2*Math.PI/180,dp=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;

function invasionAt(lat,lng){

  if(!track||!track.length)return {prob:(w.invade_prob!=null?w.invade_prob:null),eta_iso:w.eta_iso,eta:w.eta_text,dist:w.min_dist_km};
  let minD=1e9,prob=0,eta_iso=null;const now=Date.now();

    const r15=+p.r15||0,r25=+p.r25||0;let pr=0;
    if(r25&&d<=r25)pr=0.9;else if(r15&&d<=r15)pr=0.65;else if(r15&&d<=r15+100)pr=0.35;else if(r15&&d<=r15+300)pr=0.12;
    if(pr>prob)prob=pr;
    if(r15&&d<=r15&&!eta_iso&&p.t&&Date.parse(p.t)>now)eta_iso=p.t;}
  if(prob===0&&minD<400)prob=+(0.12*(1-minD/400)).toFixed(2);
  return {prob:+prob.toFixed(2),eta_iso,eta:eta_iso?`約 ${Math.round((Date.parse(eta_iso)-now)/3600e3)} 小時後`:(w.eta_text||"追蹤中"),dist:Math.round(minD)};}
function shortRegion(nm){return nm?nm.replace("雲林縣","").replace("彰化縣","彰化·").replace("嘉義縣","嘉義·").replace(/[縣市]$/,""):"雲林";}
function invasionByRegion(){const map={};getFields().forEach(f=>{if(!f.geo)return;const t=whichTownship(f.geo.lat,f.geo.lng);
  const r=t?shortRegion(t.name):"你的田";const pr=invasionAt(f.geo.lat,f.geo.lng).prob||0;if(map[r]==null||pr>map[r])map[r]=pr;});return map;}

  const now=todayISO();const T=growthDays(f.crop,f.plant);const age=daysBetween(f.plant,now);
  const maturity=clamp(age/T,0,2);const harvestISO=addDaysISO(f.plant,T);const daysToHarvest=Math.round(daysBetween(now,harvestISO));
  const phiOkISO=f.spray?addDaysISO(f.spray,+f.phi||0):null;const phiShort=phiOkISO?Math.ceil(daysBetween(now,phiOkISO)):0;

  const region=f.geo?shortRegion((whichTownship(f.geo.lat,f.geo.lng)||{}).name):"雲林";

    // 強度＝風(颱風逼近時雨未到也算) + 24hr雨 + 瞬間雨

    // 地勢：低窪→搶收；地勢高→價格機會
    if((+f.flood||1)>=4){lines.push(`地勢低窪（等級 ${f.flood}），泡水 48hr 起爛根，須提前收`);}

  else{const recent=series.slice(-90).map(e=>e[1].avg);

      band=`${lo.toFixed(0)}–${hi.toFixed(0)}`;note=`⚠ 同期資料少（僅 ${near.length} 天，此作物在此季少見），改用<b>近三個月</b>行情粗估：中位約 <b>${med.toFixed(1)}</b> 元/公斤`;}

const TOWNSHIPS=[
 ["雲林縣二崙鄉",23.771,120.413],["雲林縣西螺鎮",23.798,120.466],["雲林縣崙背鄉",23.757,120.352],
 ["雲林縣莿桐鄉",23.771,120.510],["雲林縣虎尾鎮",23.708,120.433],["雲林縣土庫鎮",23.677,120.392],
 ["雲林縣褒忠鄉",23.694,120.310],["雲林縣東勢鄉",23.674,120.256],["雲林縣台西鄉",23.702,120.197],
 ["雲林縣麥寮鄉",23.753,120.253],["雲林縣斗六市",23.712,120.542],["雲林縣斗南鎮",23.680,120.478],
 ["雲林縣古坑鄉",23.642,120.562],["雲林縣大埤鄉",23.645,120.430],["雲林縣元長鄉",23.653,120.316],
 ["雲林縣北港鎮",23.575,120.302],["雲林縣水林鄉",23.573,120.245],["雲林縣口湖鄉",23.585,120.185],
 ["雲林縣四湖鄉",23.638,120.222],["雲林縣林內鄉",23.757,120.612],
 ["彰化縣二林鎮",23.899,120.374],["彰化縣溪州鄉",23.851,120.499],["彰化縣竹塘鄉",23.859,120.427],
 ["嘉義縣新港鄉",23.552,120.348],["嘉義縣溪口鄉",23.628,120.393]];
function whichTownship(lat,lng){
  if(!isFinite(lat)||!isFinite(lng))return null;let best=null,bd=1e9;
  for(const [nm,la,lo] of TOWNSHIPS){const dd=Math.hypot((la-lat)*111,(lo-lng)*101.6);if(dd<bd){bd=dd;best=nm;}}
  return {name:best,km:+bd.toFixed(1)};}
function townshipText(lat,lng){const w=whichTownship(lat,lng);if(!w)return"";
  return w.km>15?`⚠ 離 ${w.name} 約 ${w.km}km，可能不在雲林近郊，請確認座標`
    :`📍 這個座標落在 <b>${w.name}</b>${w.km>3?`附近（約 ${w.km}km）`:""}`;}
function fieldArea(geo){if(!geo)return"";const w=whichTownship(geo.lat,geo.lng);
  return w?w.name.replace("雲林縣","").replace("彰化縣","彰·").replace("嘉義縣","嘉·"):geo.lat+","+geo.lng;}

/* ══════ 設定 UI ══════ */
let editingId=null;
function openSettings(){renderSettings();document.getElementById("modal").classList.add("on");}
function closeSettings(){document.getElementById("modal").classList.remove("on");}
function renderSettings(){
  applyFont();
  const ms=document.getElementById("mktSelect");ms.innerHTML="";
  marketNames().forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;if(m===MARKET)o.selected=true;ms.appendChild(o);});
  renderCropPick();
  // 田區
  const fl=document.getElementById("fieldList");fl.innerHTML="";const fields=getFields();
  fields.forEach(f=>{const row=document.createElement("div");row.className="listrow";
    row.innerHTML=`<span class="wn">${f.name}</span><span class="sp"><button class="ed" data-id="${f.id}">編輯</button><button class="rm" data-id="${f.id}">刪除</button></span>
      <span class="ws">${f.crop}·播種 ${f.plant}·淹水等級 ${f.flood}${f.spray?"·施藥 "+f.spray+"(PHI"+f.phi+")":""}${f.geo?"·📍"+fieldArea(f.geo):""}</span>`;fl.appendChild(row);});
  fl.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{const f=getFields().find(x=>x.id===b.dataset.id);
    if(!confirm(`確定要刪除田區「${f?f.name:""}」嗎？\n此動作無法復原。`))return;
    S.setFields(getFields().filter(x=>x.id!==b.dataset.id));renderSettings();renderHarvest();});
  fl.querySelectorAll(".ed").forEach(b=>b.onclick=()=>openFieldForm(getFields().find(x=>x.id===b.dataset.id)));
  // 作物下拉（田區表單 + 採收預判）
  [document.getElementById("ffCrop"),document.getElementById("fcCrop")].forEach(sel=>{if(sel.options.length)return;
    cropList().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});});
}
/* 我的品項：勾選表（勾＝顯示；分蔬菜/水果；省空間、可增可刪） */
function renderCropPick(){
  const box=document.getElementById("cropPick");if(!box)return;box.innerHTML="";
  const av=availableCrops(),watch=watchCrops();
  if(!av.length){box.innerHTML='<p class="hintline">此市場目前無行情資料。</p>';return;}
  [["蔬菜","🥬"],["水果","🍉"]].forEach(([cat,emoji])=>{
    const items=av.filter(c=>cropCat(c)===cat);if(!items.length)return;
    const grp=document.createElement("div");grp.className="pickgrp";
    grp.innerHTML=`<div class="pickh">${emoji} ${cat}（勾選要看的）</div>`;
    const grid=document.createElement("div");grid.className="pickgrid";
    items.forEach(c=>{const on=watch.includes(c);const lab=document.createElement("label");lab.className="chip"+(on?" on":"");
      lab.innerHTML=`<input type="checkbox" value="${c}"${on?" checked":""}><span>${c}</span>`;grid.appendChild(lab);});
    grp.appendChild(grid);box.appendChild(grp);
  });
  box.querySelectorAll("input[type=checkbox]").forEach(cb=>cb.onchange=()=>{
    const c=cb.value;let w=watchCrops().slice();
    if(cb.checked){if(!w.includes(c))w.push(c);}else{w=w.filter(x=>x!==c);}
    S.setWatch(MARKET,w);cb.closest(".chip").classList.toggle("on",cb.checked);
    if(!cb.checked&&CUR===c){CUR=null;}
    MKTMODE="list";DETAIL=null;renderBoard();   // 改看板清單後回列表
  });
}
function openFieldForm(f){editingId=f?f.id:null;const ff=document.getElementById("fieldForm");ff.classList.add("on");
  document.getElementById("ffName").value=f?f.name:"";document.getElementById("ffCrop").value=f?f.crop:cropList()[0];
  document.getElementById("ffPlant").value=f?f.plant:todayISO();document.getElementById("ffFlood").value=f?f.flood:4;
  document.getElementById("ffSpray").value=f?(f.spray||""):"";document.getElementById("ffPhi").value=f?(f.phi||""):"";
  document.getElementById("ffLat").value=(f&&f.geo)?f.geo.lat:"";document.getElementById("ffLng").value=(f&&f.geo)?f.geo.lng:"";
  updateFfArea();
  ff.scrollIntoView({behavior:"smooth",block:"nearest"});}
function updateFfArea(){const a=document.getElementById("ffArea");if(!a)return;
  const lat=parseFloat(document.getElementById("ffLat").value),lng=parseFloat(document.getElementById("ffLng").value);
  a.innerHTML=(isFinite(lat)&&isFinite(lng))?townshipText(lat,lng):"";}
function saveField(){const name=document.getElementById("ffName").value.trim()||"未命名田";
  const lat=parseFloat(document.getElementById("ffLat").value),lng=parseFloat(document.getElementById("ffLng").value);
  const rec={id:editingId||("F"+Date.now().toString(36)),name,crop:document.getElementById("ffCrop").value,
    plant:document.getElementById("ffPlant").value||todayISO(),flood:+document.getElementById("ffFlood").value,
    spray:document.getElementById("ffSpray").value||"",phi:+document.getElementById("ffPhi").value||0,
    geo:(isFinite(lat)&&isFinite(lng))?{lat:+lat.toFixed(5),lng:+lng.toFixed(5)}:null};
  let fields=getFields();const idx=fields.findIndex(x=>x.id===rec.id);if(idx>=0)fields[idx]=rec;else fields.push(rec);
  S.setFields(fields);editingId=null;document.getElementById("fieldForm").classList.remove("on");renderSettings();renderHarvest();}
document.getElementById("ffGeo").addEventListener("click",()=>{
  const btn=document.getElementById("ffGeo");if(!navigator.geolocation){btn.textContent="此裝置不支援定位";return;}
  btn.textContent="定位中…";
  navigator.geolocation.getCurrentPosition(p=>{document.getElementById("ffLat").value=p.coords.latitude.toFixed(5);
    document.getElementById("ffLng").value=p.coords.longitude.toFixed(5);btn.textContent="📍 已擷取目前位置";updateFfArea();},
    e=>{btn.textContent="定位失敗（請允許定位權限）";},{enableHighAccuracy:true,timeout:10000});});
["ffLat","ffLng"].forEach(id=>document.getElementById(id).addEventListener("input",updateFfArea));

document.getElementById("fsRow").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;S.fs=b.dataset.v;applyFont();});
document.getElementById("mktSelect").addEventListener("change",async e=>{MARKET=e.target.value;S.market=MARKET;
  CUR=null;DETAIL=null;MKTMODE="list";await loadMarket(MARKET);renderBoard();renderSettings();});
document.getElementById("fieldAddBtn").addEventListener("click",()=>openFieldForm(null));
document.getElementById("ffSave").addEventListener("click",saveField);
document.getElementById("gear").addEventListener("click",openSettings);
document.getElementById("closeSet").addEventListener("click",closeSettings);
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeSettings();});
document.getElementById("fcGo").addEventListener("click",renderForecast);

/* ══════ 分頁 / 角色 ══════ */
function ensureCropList(id){const sel=document.getElementById(id);if(sel.options.length)return;
  cropList().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});}
function switchTab(m){
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.t===m));
  ["market","harvest","forecast","compare"].forEach(v=>document.getElementById("view-"+v).classList.toggle("on",v===m));
  if(m==="forecast"){ensureCropList("fcCrop");if(!document.getElementById("fcDate").value)document.getElementById("fcDate").value=todayISO();}
  if(m==="compare"){renderCmpCat();populateCompareCrops();renderCompare();}
}
let CMPCAT="蔬菜";
function renderCmpCat(){const bar=document.getElementById("cmpCat");if(!bar)return;
  const all=Object.keys(cropMap());const present=["蔬菜","水果"].filter(cat=>all.some(c=>cropCat(c)===cat));
  if(!present.includes(CMPCAT))CMPCAT=present[0]||"蔬菜";
  bar.innerHTML=present.map(c=>`<button data-c="${c}" class="${c===CMPCAT?'on':''}">${c==='蔬菜'?'🥬 蔬菜':'🍉 水果'}</button>`).join("");
  bar.querySelectorAll("button").forEach(b=>b.onclick=()=>{CMPCAT=b.dataset.c;renderCmpCat();populateCompareCrops();renderCompare();});}
function populateCompareCrops(){const sel=document.getElementById("cmpCrop");if(!sel)return;
  const items=Object.keys(cropMap()).filter(c=>cropCat(c)===CMPCAT).sort();const cur=sel.value;
  sel.innerHTML=items.map(c=>`<option value="${c}">${c}</option>`).join("");
  if(cur&&items.includes(cur))sel.value=cur;}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.t)));

function renderCompare(){
  const crop=document.getElementById("cmpCrop").value;const box=document.getElementById("cmpResult");
  const w=cropMap()[crop];const latest=(INDEX&&INDEX.latest)||{};const rows=[];
  for(const mk of marketNames()){const lm=latest[mk];if(lm&&lm[w]&&lm[w].avg>0)rows.push({mk,avg:lm[w].avg,date:lm[w].date||""});}
  if(!rows.length){box.innerHTML='<div class="empty">此品項目前各市場無行情資料。</div>';return;}
  rows.sort((a,b)=>a.avg-b.avg);
  box.innerHTML=rows.map((r,i)=>`<div class="cmprow ${i===0?'cheap':''}">
    <span class="rk">${i+1}</span><span class="mk">${r.mk}<small>${r.date}</small></span>
    <span class="pv mono">${r.avg.toFixed(1)}</span><span class="pu">元/公斤</span>
    ${i===0?'<span class="best">最便宜</span>':''}</div>`).join("");
}
document.getElementById("cmpCrop").addEventListener("change",renderCompare);

function applyRole(){
  const r=S.role;
  document.querySelectorAll("#roleRow button").forEach(b=>b.classList.toggle("on",b.dataset.r===r));
  const show={market:true,harvest:r==="farmer",forecast:r==="farmer",compare:r==="merchant"};
  document.querySelectorAll(".tab").forEach(t=>{t.style.display=show[t.dataset.t]?"":"none";});
  const rh=document.getElementById("roleHint");
  if(rh)rh.textContent=(r==="merchant")?"商人：看批發價＋跨市場比價（找便宜進貨），隱藏田區/採收。":"蔬果農：行情＋田區搶收＋採收預判。";
  const active=document.querySelector(".tab.on");
  if(!active||active.style.display==="none")switchTab("market");
}
document.getElementById("roleRow").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  S.role=b.dataset.r;applyRole();if(MKTMODE==="detail"&&DETAIL)renderDetail(DETAIL);});   // 角色切換即時更新詳細頁買賣價

/* ══════ 啟動 ══════ */
(async function(){
  applyFont();
  const vl=document.getElementById("verLabel");if(vl)vl.textContent="巡田水 "+VERSION;
  const {index,live}=await loadIndex();INDEX=index;
  document.getElementById("updated").textContent="更新："+(index.updated||"—");
  const mode=document.getElementById("mode");mode.className="badge "+(live?"live":"demo");mode.textContent=live?"實際資料":"示範資料";
  const names=marketNames();MARKET=(S.market&&names.includes(S.market))?S.market:names[0];
  await loadMarket(MARKET);
  WEVENTS=await loadEvents();
  renderBoard();   // 預設進看板清單；點一項才進詳細頁（K線+逐日明細）
  WEATHER=await loadWeather();renderHarvest();
  // 採收預判作物下拉
  const fc=document.getElementById("fcCrop");cropList().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;fc.appendChild(o);});
  document.getElementById("fcDate").value=todayISO();
  applyRole();   // 依角色顯示/隱藏分頁
})();
/* PWA：註冊 Service Worker（可安裝到主畫面、離線可用）。失敗不影響網頁運作。 */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
</script>
