<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
<title>豐雨無阻 · 葉菜行情 · 搶收預判</title>
<style>
  :root{ font-size:19px; }
  :root[data-fs="s"]{ font-size:16px; } :root[data-fs="m"]{ font-size:19px; }
  :root[data-fs="l"]{ font-size:23px; } :root[data-fs="xl"]{ font-size:28px; }
  :root{
    --bg:#12160E; --panel:#1B2015; --panel2:#232A1B; --line:#313A22;
    --leaf:#A6C955; --leaf-dim:#6E8F3C; --paper:#EFEAD8; --muted:#9aa27a;
    --g:#7CC24A; --y:#F2B705; --o:#E8862E; --r:#E4572E; --cool:#6FB0A6;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--paper);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;}
  .mono{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  :focus-visible{outline:3px solid var(--leaf);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  .wrap{max-width:760px;margin:0 auto;
    padding:calc(0.9rem + env(safe-area-inset-top)) calc(0.8rem + env(safe-area-inset-right)) 3rem calc(0.8rem + env(safe-area-inset-left));}

  header{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;padding-bottom:0.7rem;border-bottom:1px solid var(--line);}
  header h1{font-size:1.35rem;font-weight:900;margin:0;letter-spacing:.5px;line-height:1.2;}
  header h1 .dot{color:var(--leaf);}
  .gear{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    width:2.4rem;height:2.4rem;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .subline{width:100%;display:flex;gap:0.5rem 0.8rem;flex-wrap:wrap;align-items:center;font-size:0.72rem;color:var(--muted);margin-top:0.3rem;}
  .badge{padding:0.15rem 0.55rem;border-radius:999px;font-size:0.7rem;font-weight:700;border:1px solid var(--line);white-space:nowrap;}
  .badge.demo{color:var(--y);border-color:#5a4d13;background:#231d07;}
  .badge.live{color:var(--leaf);border-color:#2f4a1c;background:#182312;}

  .tabs{display:flex;gap:0.4rem;margin:0.9rem 0;}
  .tab{flex:1;background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:0.65rem 0.3rem;border-radius:999px;font-size:0.95rem;font-weight:800;}
  .tab.on{color:var(--bg);background:var(--leaf);border-color:var(--leaf);}
  .view{display:none;} .view.on{display:block;}

  /* 行情 */
  .mkt-label{font-size:0.8rem;color:var(--muted);margin:0.2rem 0 0.6rem;}
  .mkt-label b{color:var(--paper);}
  .board{display:flex;flex-direction:column;gap:0.55rem;}
  .prow{display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:0.8rem 0.9rem;text-align:left;color:inherit;width:100%;}
  .prow.on{box-shadow:inset 4px 0 0 var(--leaf);background:var(--panel2);}
  .prow .dot{width:0.7rem;height:0.7rem;border-radius:50%;flex:0 0 auto;}
  .prow .dot.up{background:var(--r);} .prow .dot.dn{background:var(--g);} .prow .dot.mid{background:var(--y);}
  .prow .nm{font-size:1.1rem;font-weight:800;}
  .prow .px{margin-left:auto;text-align:right;white-space:nowrap;}
  .prow .px .v{font-size:1.5rem;font-weight:900;}
  .prow .px .u{font-size:0.68rem;color:var(--muted);}
  .prow .chev{color:var(--muted);font-size:1rem;flex:0 0 auto;}
  .tag{font-size:0.72rem;font-weight:800;padding:0.15rem 0.5rem;border-radius:999px;white-space:nowrap;}
  .tag.up{color:#2a1409;background:var(--r);} .tag.dn{color:#0e1a08;background:var(--g);} .tag.mid{color:#2a2306;background:var(--y);}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:var(--radius);padding:1.2rem;text-align:center;color:var(--muted);font-size:0.9rem;}

  /* 股票式查價卡 */
  .quote{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;}
  .quote h3{margin:0;font-size:1.2rem;}
  .quote .price{display:flex;align-items:baseline;gap:0.5rem;margin-top:0.3rem;flex-wrap:wrap;}
  .quote .price .v{font-size:2.4rem;font-weight:900;line-height:1;}
  .quote .price .v.up{color:var(--r);} .quote .price .v.dn{color:var(--g);} .quote .price .v.mid{color:var(--paper);}
  .quote .price .u{font-size:0.75rem;color:var(--muted);}
  .quote .chg{font-size:0.95rem;font-weight:800;}
  .quote .chg.up{color:var(--r);} .quote .chg.dn{color:var(--g);} .quote .chg.mid{color:var(--y);}
  .quote .ohlc{display:flex;flex-wrap:wrap;gap:0.4rem 1.2rem;margin-top:0.6rem;font-size:0.82rem;color:var(--muted);}
  .quote .ohlc b{color:var(--paper);font-weight:800;}
  .qchart{margin-top:0.7rem;} .qchart svg{width:100%;height:7.5rem;display:block;touch-action:none;}
  .qchart .cap{font-size:0.7rem;color:var(--muted);margin-top:0.25rem;}
  .qtip{font-size:0.82rem;color:var(--paper);margin-top:0.45rem;min-height:1.3rem;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:0.4rem 0.6rem;}
  .qtip b{color:var(--leaf);} .qtip .ev{color:var(--cool);font-weight:700;}

  /* 田區搶收 */
  .alert{border:1px solid #5a2c1f;border-radius:var(--radius);
    background:linear-gradient(90deg,rgba(228,87,46,.18),rgba(228,87,46,.05) 60%,transparent);
    padding:0.9rem 1rem;display:flex;flex-wrap:wrap;align-items:center;gap:0.3rem 1rem;margin-bottom:0.9rem;}
  .alert.calm{border-color:#2f4a1c;background:linear-gradient(90deg,rgba(124,194,74,.14),transparent 60%);}
  .alert .pulse{width:0.7rem;height:0.7rem;border-radius:50%;background:var(--r);flex:0 0 auto;box-shadow:0 0 0 0 rgba(228,87,46,.6);animation:pulse 1.8s infinite;}
  .alert.calm .pulse{background:var(--g);animation:none;}
  .alert.track{border-color:#5a4d13;background:linear-gradient(90deg,rgba(242,183,5,.14),transparent 60%);}
  .alert.track .pulse{background:var(--y);}
  .alert.track .big b{color:var(--y);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(228,87,46,.55)}70%{box-shadow:0 0 0 0.6rem rgba(228,87,46,0)}100%{box-shadow:0 0 0 0 rgba(228,87,46,0)}}
  .alert .big{font-size:1.02rem;font-weight:800;width:100%;} .alert .big b{color:#F6C6B4;} .alert.calm .big b{color:var(--leaf);}
  .alert .k{font-size:0.8rem;color:var(--muted);} .alert .k b{color:var(--paper);}

  .cards{display:flex;flex-direction:column;gap:0.7rem;}
  .fcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:0.9rem;position:relative;overflow:hidden;}
  .fcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--dec,var(--muted));}
  .fcard.dec-r{--dec:var(--r)} .fcard.dec-o{--dec:var(--o)} .fcard.dec-y{--dec:var(--y)} .fcard.dec-g{--dec:var(--g)}
  .fcard .ctop{display:flex;align-items:baseline;gap:0.5rem;flex-wrap:wrap;}
  .fcard .cid{font-size:1.1rem;font-weight:800;} .fcard .cid small{color:var(--muted);font-weight:400;font-size:0.75rem;}
  .fcard .pill{margin-left:auto;font-size:0.85rem;font-weight:800;padding:0.25rem 0.7rem;border-radius:999px;color:#12160E;background:var(--dec);white-space:nowrap;}
  .fcard .pill.dec-y{color:#2a2306;}
  .fcard .line{font-size:0.85rem;color:var(--muted);margin-top:0.4rem;}
  .fcard .line b.hi{color:var(--r);} .fcard .line b.mid{color:var(--o);} .fcard .line b.lo{color:var(--g);} .fcard .line b{color:var(--paper);}
  .count{margin-top:0.6rem;border:1px solid var(--line);border-radius:12px;padding:0.6rem 0.7rem;background:var(--panel2);}
  .count .cl{font-size:0.72rem;color:var(--muted);} .count .cd{font-size:1.8rem;font-weight:900;line-height:1.1;}
  .count.soon .cd{color:var(--r);animation:blink 1.1s steps(2,jump-none) infinite;}
  .count .cn{font-size:0.72rem;color:var(--muted);margin-top:0.15rem;} .count.none .cd{font-size:1rem;color:var(--muted);font-weight:700;}
  @keyframes blink{50%{opacity:.45}}
  .dilemma{margin-top:0.6rem;border:1px solid #6a5410;background:#241d06;border-radius:12px;padding:0.6rem 0.7rem;}
  .dilemma .dh{color:var(--y);font-weight:800;font-size:0.9rem;} .dilemma .dt{font-size:0.8rem;color:#e7dcb4;margin-top:0.25rem;}
  .oppo{margin-top:0.6rem;border:1px solid #2f4a4a;background:#0e1a1a;border-radius:12px;padding:0.6rem 0.7rem;}
  .oppo .oh{color:var(--cool);font-weight:800;font-size:0.9rem;} .oppo .ot{font-size:0.8rem;color:#cfe3df;margin-top:0.25rem;}

  /* 採收預判 */
  .form{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:0.8rem;}
  .form label{font-size:0.85rem;color:var(--muted);display:block;margin-bottom:0.3rem;}
  .form input,.form select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.6rem 0.7rem;border-radius:12px;font-size:1rem;}
  .form .go{background:var(--leaf);color:var(--bg);border:0;border-radius:12px;padding:0.7rem;font-size:1.05rem;font-weight:800;}
  .fcresult{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;}
  .fcresult h3{margin:0 0 0.4rem;font-size:1.1rem;}
  .fcresult .band{font-size:2rem;font-weight:900;} .fcresult .band .u{font-size:0.75rem;color:var(--muted);font-weight:400;}
  .fcresult .row{font-size:0.9rem;color:var(--muted);margin-top:0.4rem;} .fcresult .row b{color:var(--paper);}
  .fcresult .risk{margin-top:0.6rem;border-radius:12px;padding:0.6rem 0.7rem;font-size:0.85rem;}
  .fcresult .risk.warn{border:1px solid #6a5410;background:#241d06;color:#e7dcb4;}
  .fcresult .risk.ok{border:1px solid #2f4a1c;background:#182312;color:#d7e6bf;}

  .foot{margin-top:1.6rem;color:var(--muted);font-size:0.72rem;line-height:1.7;border-top:1px solid var(--line);padding-top:0.9rem;}

  /* 設定 sheet */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;align-items:flex-end;justify-content:center;}
  .modal.on{display:flex;}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;padding:1.1rem 1rem 1.6rem;}
  @media(min-width:520px){.modal{align-items:center;} .sheet{border-radius:20px;}}
  .sheet h2{margin:0 0 0.2rem;font-size:1.2rem;font-weight:900;display:flex;align-items:center;}
  .sheet .close{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--paper);width:2.1rem;height:2.1rem;border-radius:50%;font-size:1.1rem;}
  .setblk{margin-top:1.2rem;} .setblk h4{margin:0 0 0.5rem;font-size:0.95rem;color:var(--muted);font-weight:700;}
  .fsrow{display:flex;gap:0.5rem;}
  .fsrow button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.6rem 0.3rem;border-radius:12px;font-weight:800;}
  .fsrow button[data-v="s"]{font-size:0.85rem;} .fsrow button[data-v="m"]{font-size:1rem;} .fsrow button[data-v="l"]{font-size:1.2rem;} .fsrow button[data-v="xl"]{font-size:1.45rem;}
  .fsrow button.on{background:var(--leaf);color:var(--bg);border-color:var(--leaf);}
  select.mkt{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.65rem 0.7rem;border-radius:12px;font-size:1rem;}
  .listrow{display:flex;align-items:center;gap:0.6rem;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:0.55rem 0.7rem;margin-bottom:0.45rem;flex-wrap:wrap;}
  .listrow .wn{font-weight:700;font-size:0.98rem;} .listrow .ws{font-size:0.72rem;color:var(--muted);width:100%;}
  .listrow .sp{margin-left:auto;display:flex;gap:0.4rem;}
  .listrow .rm{background:transparent;border:1px solid #5a2c1f;color:var(--r);border-radius:999px;padding:0.2rem 0.7rem;font-size:0.8rem;font-weight:800;}
  .listrow .ed{background:transparent;border:1px solid var(--line);color:var(--paper);border-radius:999px;padding:0.2rem 0.7rem;font-size:0.8rem;font-weight:800;}
  .addrow{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
  .addrow select{flex:1;min-width:8rem;background:var(--panel2);border:1px solid var(--line);color:var(--paper);padding:0.55rem 0.6rem;border-radius:12px;font-size:0.95rem;}
  .addrow button{background:var(--leaf);color:var(--bg);border:0;border-radius:12px;padding:0.55rem 1rem;font-weight:800;}
  .addrow button:disabled{opacity:.4;}
  .fieldform{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:0.7rem;margin-top:0.5rem;display:none;flex-direction:column;gap:0.55rem;}
  .fieldform.on{display:flex;}
  .fieldform label{font-size:0.78rem;color:var(--muted);}
  .fieldform input,.fieldform select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--paper);padding:0.5rem 0.6rem;border-radius:10px;font-size:0.95rem;}
  .fieldform .frow{display:flex;gap:0.5rem;} .fieldform .frow>div{flex:1;}
  .fieldform .save{background:var(--leaf);color:var(--bg);border:0;border-radius:10px;padding:0.6rem;font-weight:800;}
  .hintline{font-size:0.74rem;color:var(--muted);margin-top:0.5rem;line-height:1.6;}
  .ver{color:#5a6146;font-size:0.7rem;text-align:center;margin-top:1.5rem;letter-spacing:.5px;}
  .addbtn{width:100%;background:transparent;border:1px dashed var(--leaf-dim);color:var(--leaf);border-radius:12px;padding:0.6rem;font-weight:800;margin-top:0.3rem;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>豐雨無阻<span class="dot">.</span></h1>
    <button class="gear" id="gear" aria-label="設定">⚙️</button>
    <div class="subline">
      <span id="updated">—</span><span id="mode" class="badge demo">示範資料</span>
      <span>西螺果菜市場 · 行情 ＋ 搶收 ＋ 採收預判</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab on" data-t="market">行情看板</button>
    <button class="tab" data-t="harvest">田區搶收</button>
    <button class="tab" data-t="forecast">採收預判</button>
  </nav>

  <div class="view on" id="view-market">
    <p class="mkt-label">市場：<b id="mktName">—</b>　·　點品項像股票一樣查價</p>
    <div class="board" id="board"></div>
    <div id="quote"></div>
  </div>

  <div class="view" id="view-harvest">
    <div class="alert" id="hAlert"></div>
    <div class="cards" id="hCards"></div>
  </div>

  <div class="view" id="view-forecast">
    <div class="form">
      <div><label>作物</label><select id="fcCrop"></select></div>
      <div><label>種植日（或已種的定植日）</label><input type="date" id="fcDate"></div>
      <button class="go" id="fcGo">預估採收期價格</button>
    </div>
    <div id="fcResult"></div>
    <p class="hintline">用近一年同期的實際行情推估採收時的價格區間，並提示颱風季風險。資料越多越準。</p>
  </div>

  <p class="foot">
    價格為農業部「農產品交易行情」公開資料；颱風/雨量為中央氣象署資料。抓不到時顯示示範資料，不當機。<br>
    字體大小、市場、品項、<b>你的田區（新增/刪除）</b>都在右上齒輪 ⚙️ 裡。
  </p>
</div>

<div class="modal" id="modal">
  <div class="sheet" role="dialog" aria-label="設定">
    <h2>設定 <button class="close" id="closeSet" aria-label="關閉">✕</button></h2>

    <div class="setblk"><h4>字體大小</h4>
      <div class="fsrow" id="fsRow">
        <button data-v="s">小</button><button data-v="m">中</button><button data-v="l">大</button><button data-v="xl">特大</button>
      </div></div>

    <div class="setblk"><h4>果菜市場</h4><select class="mkt" id="mktSelect"></select></div>

    <div class="setblk"><h4>我的品項（行情看板顯示哪些）</h4>
      <div id="watchList"></div>
      <div class="addrow"><select id="addSelect"></select><button id="addBtn">＋ 新增</button></div>
    </div>

    <div class="setblk"><h4>我的田區（搶收/採收用）</h4>
      <div id="fieldList"></div>
      <button class="addbtn" id="fieldAddBtn">＋ 新增一塊田</button>
      <div class="fieldform" id="fieldForm">
        <div><label>田區名稱</label><input id="ffName" placeholder="例：A12 溪底田"></div>
        <div><label>作物</label><select id="ffCrop"></select></div>
        <div class="frow">
          <div><label>播種/定植日</label><input type="date" id="ffPlant"></div>
          <div><label>地勢淹水等級</label><select id="ffFlood">
            <option value="1">1 高亢·排水好</option><option value="2">2 偏高</option>
            <option value="3">3 一般</option><option value="4" selected>4 偏低窪</option><option value="5">5 低窪易淹</option>
          </select></div>
        </div>
        <div class="frow">
          <div><label>最後施藥日（可空）</label><input type="date" id="ffSpray"></div>
          <div><label>農藥安全期天數(PHI)</label><input type="number" id="ffPhi" min="0" placeholder="例：7"></div>
        </div>
        <button class="save" id="ffSave">儲存這塊田</button>
      </div>
      <p class="hintline">田區存在你手機，隨時增刪、改地勢立即生效。⚠ PHI 請查農藥登記值，勿臆填。</p>
    </div>

    <p class="ver" id="verLabel"></p>
  </div>
</div>

<script>
/* ══════ 基礎 ══════ */
const VERSION="V0016p00709";
function resolveGhBase(){const {origin,pathname,hostname}=location;
  if(hostname.endsWith("github.io")){const s=pathname.split("/").filter(Boolean);return origin+(s.length?"/"+s[0]:"");}return ".";}
function doyOf(iso){const [Y,M,D]=iso.split("-").map(Number);return Math.floor((Date.UTC(Y,M-1,D)-Date.UTC(Y,0,0))/86400000);}
function weekOf(iso){return Math.floor(doyOf(iso)/7);}
function median(a){if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);const m=s.length>>1;return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function pctile(a,p){if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);return s[Math.min(s.length-1,Math.floor(s.length*p))];}
function mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function pad(n){return String(n).padStart(2,"0");}
function todayISO(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function addDaysISO(iso,n){const [Y,M,D]=iso.split("-").map(Number);const d=new Date(Date.UTC(Y,M-1,D));d.setUTCDate(d.getUTCDate()+n);
  return d.getUTCFullYear()+"-"+pad(d.getUTCMonth()+1)+"-"+pad(d.getUTCDate());}
function daysBetween(a,b){return (Date.parse(b+"T00:00:00Z")-Date.parse(a+"T00:00:00Z"))/86400000;}

/* ══════ 作物農藝參數 ══════ */
const GROWTH={青江菜:[38,48],小白菜:[25,38],芥藍菜:[70,70],菠菜:[50,50],空心菜:[30,40],
  地瓜葉:[35,45],莧菜:[30,40],茼蒿:[40,50],油菜:[35,45],"萵苣(A菜)":[40,50],芥菜:[55,65]};
const MAT_MIN={青江菜:.75,小白菜:.7,芥藍菜:.75,菠菜:.75,空心菜:.7,地瓜葉:.7,莧菜:.7,茼蒿:.72,油菜:.72,"萵苣(A菜)":.75,芥菜:.75};
const V_CROP={青江菜:.95,小白菜:.95,芥藍菜:.8,菠菜:.85,空心菜:.7,地瓜葉:.65,莧菜:.85,茼蒿:.85,油菜:.85,"萵苣(A菜)":.9,芥菜:.8};
const FLOOD_ADV={1:0,2:0,3:12,4:18,5:24};
function isSummer(iso){const m=+iso.split("-")[1];return m>=5&&m<=10;}
function growthDays(crop,plantISO){const g=GROWTH[crop]||[35,45];return isSummer(plantISO)?g[0]:g[1];}
function cropList(){return Object.keys(GROWTH);}

/* ══════ 設定/儲存 ══════ */
const S={
  get fs(){return localStorage.getItem("vs_fs")||"l";}, set fs(v){localStorage.setItem("vs_fs",v);},
  get market(){return localStorage.getItem("vs_market")||"";}, set market(v){localStorage.setItem("vs_market",v);},
  watch(mk){try{return JSON.parse(localStorage.getItem("vs_watch_"+mk));}catch(e){return null;}},
  setWatch(mk,a){localStorage.setItem("vs_watch_"+mk,JSON.stringify(a));},
  get fields(){try{const f=JSON.parse(localStorage.getItem("vs_fields"));return Array.isArray(f)?f:null;}catch(e){return null;}},
  setFields(a){localStorage.setItem("vs_fields",JSON.stringify(a));},
};

  document.querySelectorAll("#fsRow button").forEach(b=>b.classList.toggle("on",b.dataset.v===S.fs));}
function seedFields(){return [
  {id:"A12",name:"A12 溪底田",crop:"青江菜",plant:addDaysISO(todayISO(),-22),flood:4,spray:addDaysISO(todayISO(),-3),phi:8},
  {id:"E09",name:"E09 高地",crop:"小白菜",plant:addDaysISO(todayISO(),-15),flood:1,spray:"",phi:0},
  {id:"C03",name:"C03 芥藍田",crop:"芥藍菜",plant:addDaysISO(todayISO(),-55),flood:3,spray:addDaysISO(todayISO(),-10),phi:3},
];}
function getFields(){let f=S.fields;if(!f){f=seedFields();S.setFields(f);}return f;}

/* ══════ 行情資料 ══════ */
let INDEX=null,MDATA={},MARKET="",CUR=null,WEATHER=null;
function marketNames(){return ((INDEX&&INDEX.markets)||[]).map(m=>m.name);}
function cropMap(){return (INDEX&&INDEX.crop_map)||{};}
async function loadIndex(){
  try{const r=await fetch(`${resolveGhBase()}/prices_index.json`,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();if(!j||!j.crop_map||!Array.isArray(j.markets)||!j.markets.length)throw 0;
    j._live=true;return {index:j,live:true};}catch(e){return {index:demoIndex(),live:false};}}
async function loadMarket(mk){
  if(MDATA[mk])return MDATA[mk];
  const ent=((INDEX&&INDEX.markets)||[]).find(m=>m.name===mk);
  if(INDEX&&INDEX._live&&ent&&ent.file){
    try{const r=await fetch(`${resolveGhBase()}/${ent.file}`,{cache:"no-store"});
      if(r.ok){const j=await r.json();MDATA[mk]=(j&&j.data)||{};return MDATA[mk];}}catch(e){}}
  MDATA[mk]=demoMarketData(mk);return MDATA[mk];}
async function loadWeather(){
  try{const r=await fetch(`${resolveGhBase()}/typhoon_status.json`,{cache:"no-store"});if(!r.ok)throw 0;
    const j=await r.json();return (j&&typeof j==="object")?j:{active:false};}catch(e){return {active:false};}}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeDemo(){const rnd=mulberry32(20250704);
  const M={青江白菜:{b:22,a:5,pk:20,v:1500,sp:[7,8,9]},芥藍菜:{b:30,a:6,pk:15,v:900,sp:[8,9]},菠菜:{b:34,a:18,pk:200,v:800,hole:.6,sp:[]},
    小白菜:{b:20,a:6,pk:210,v:1800,sp:[7,8,9]},蕹菜:{b:18,a:5,pk:200,v:1600,sp:[7,8]},甘藷葉:{b:16,a:4,pk:200,v:1200,sp:[]},
    莧菜:{b:20,a:5,pk:200,v:700,sp:[7,8]},茼蒿:{b:28,a:10,pk:20,v:600,hole:.4,sp:[]},油菜:{b:19,a:5,pk:30,v:800,sp:[]},萵苣菜:{b:26,a:7,pk:25,v:900,sp:[]},芥菜:{b:22,a:6,pk:20,v:500,sp:[]}};
  const today=new Date();const start=new Date(today);start.setFullYear(start.getFullYear()-1);
  function ser(m){const s={};for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){const iso=d.toISOString().slice(0,10);const mon=d.getMonth()+1;const doy=doyOf(iso);
    let gp=.08+((m.hole&&mon>=6&&mon<=9)?m.hole:0);if(rnd()<gp)continue;const seas=Math.cos((doy-m.pk)/365*2*Math.PI);
    let px=m.b+m.a*seas+(rnd()-.5)*4,qty=m.v*(1.1-.4*seas)*(.7+rnd()*.6);if(m.sp.includes(mon)&&rnd()<.03){px*=1.8+rnd();qty*=.35;}px=Math.max(6,px);
    s[iso]={avg:+px.toFixed(1),high:+(px*1.15).toFixed(1),mid:+px.toFixed(1),low:+(px*.85).toFixed(1),qty:+qty.toFixed(0)};}return s;}
  const xl={},tp={};for(const [n,m] of Object.entries(M))xl[n]=ser(m);["青江白菜","小白菜","蕹菜","菠菜"].forEach(n=>tp[n]=ser(M[n]));
  const crop_map={青江菜:"青江白菜",芥藍菜:"芥藍菜",菠菜:"菠菜",小白菜:"小白菜",空心菜:"蕹菜",地瓜葉:"甘藷葉",莧菜:"莧菜",茼蒿:"茼蒿",油菜:"油菜","萵苣(A菜)":"萵苣菜",芥菜:"芥菜"};
  return {updated:new Date().toISOString().slice(0,16).replace("T"," "),markets:["西螺","台北一"],crop_map,data:{西螺:xl,台北一:tp}};}
let DEMO=null;
function getDemo(){if(!DEMO)DEMO=makeDemo();return DEMO;}
function demoIndex(){const d=getDemo();const latest={};
  for(const mk of d.markets){latest[mk]={};for(const [w,ser] of Object.entries(d.data[mk]||{})){const ks=Object.keys(ser).sort();if(ks.length)latest[mk][w]={...ser[ks[ks.length-1]],date:ks[ks.length-1]};}}
  return {updated:d.updated,crop_map:d.crop_map,markets:d.markets.map(n=>({name:n})),latest,_live:false};}
function demoMarketData(mk){return getDemo().data[mk]||{};}

function wholesaleOf(d){return cropMap()[d];}
function seriesFor(d){const w=wholesaleOf(d);return (w&&MDATA[MARKET]&&MDATA[MARKET][w])||{};}
function sortedEntries(s){return Object.entries(s).filter(e=>e[1]&&e[1].avg>0).sort((a,b)=>a[0]<b[0]?-1:1);}  /* 濾掉 0/無效價 */
function availableCrops(){const d=MDATA[MARKET]||{};return Object.keys(cropMap()).filter(disp=>{const w=cropMap()[disp];
  return d[w]&&Object.values(d[w]).some(v=>v&&v.avg>0);});}
function watchCrops(){let w=S.watch(MARKET);const av=availableCrops();if(!Array.isArray(w))return av.slice();w=w.filter(c=>av.includes(c));return w.length?w:av.slice();}
function priceView(disp){const es=sortedEntries(seriesFor(disp));if(!es.length)return null;const last=es[es.length-1];
  const base=median(es.slice(-90).map(e=>e[1].avg));const diff=base?((last[1].avg-base)/base*100):0;
  let cls,say;if(diff>10){cls="up";say="偏貴";}else if(diff<-10){cls="dn";say="偏便宜";}else{cls="mid";say="正常";}
  return {es,last,avg:last[1].avg,date:last[0],diff,cls,say};}

/* ══════ 事件（節慶影響菜價；颱風/寒流/大雨事件待接天氣歷史） ══════ */
const FESTIVALS=[["2025-01-29","春節"],["2025-04-04","清明"],["2025-05-31","端午"],["2025-10-06","中秋"],
  ["2026-02-17","春節"],["2026-04-05","清明"],["2026-06-19","端午"],["2026-09-25","中秋"]];
const FEST=Object.fromEntries(FESTIVALS);
let QDATA=[],QGEO=null;

/* ══════ 行情看板 ══════ */
function renderBoard(){
  document.getElementById("mktName").textContent=MARKET;
  const el=document.getElementById("board");el.innerHTML="";
  const list=watchCrops();
  if(!list.length){el.innerHTML='<div class="empty">尚未選擇品項。點右上 ⚙️ → 我的品項 → 新增。</div>';return;}
  list.forEach(disp=>{const pv=priceView(disp);const b=document.createElement("button");b.className="prow"+(disp===CUR?" on":"");
    b.innerHTML=pv?`<span class="dot ${pv.cls}"></span><span class="nm">${disp}</span>
      <span class="px"><span class="v mono">${pv.avg.toFixed(1)}</span> <span class="u">元/公斤</span></span>
      <span class="tag ${pv.cls}">${pv.say}</span><span class="chev">›</span>`
      :`<span class="dot mid"></span><span class="nm">${disp}</span><span class="px"><span class="u">近期無成交</span></span>`;
    b.onclick=()=>selectCrop(disp);el.appendChild(b);});
}
function selectCrop(d){CUR=d;renderBoard();renderQuote(d);document.getElementById("quote").scrollIntoView({behavior:"smooth",block:"nearest"});}
function renderQuote(disp){
  const box=document.getElementById("quote");const pv=priceView(disp);if(!pv){box.innerHTML="";return;}
  const es=pv.es;const prev=es.length>1?es[es.length-2][1].avg:pv.avg;const chg=pv.avg-prev;const chgP=prev?chg/prev*100:0;
  const cls=chg>0.01?"up":chg<-0.01?"dn":"mid";const arrow=chg>0.01?"▲":chg<-0.01?"▼":"＝";
  const hi=pv.last[1].high,lo=pv.last[1].low,qty=pv.last[1].qty;
  box.innerHTML=`<div class="quote">
    <h3>${disp} <span style="font-size:.7rem;color:var(--muted)">${MARKET}批發</span></h3>
    <div class="price"><span class="v ${cls} mono">${pv.avg.toFixed(1)}</span><span class="u">元/公斤</span>
      <span class="chg ${cls} mono">${arrow} ${chg>=0?"+":""}${chg.toFixed(1)} (${chgP>=0?"+":""}${chgP.toFixed(1)}%)</span></div>
    <div class="ohlc"><span>最高 <b>${hi.toFixed(1)}</b></span><span>最低 <b>${lo.toFixed(1)}</b></span>
      <span>量 <b>${qty.toLocaleString()}</b> 公斤</span><span>對比常態 <b>${pv.diff>=0?"+":""}${pv.diff.toFixed(0)}%</b>(${pv.say})</span></div>
    <div class="qchart">${ohlcSVG(es)}
      <div class="cap">近 45 交易日 · 直條＝最高↔最低 · 圓點＝均價（紅漲綠跌）· 🔺爆量 🔹節慶</div>
      <div class="qtip" id="qtip">👆 點圖上任一天，看日期與當日高/低/均價</div></div>
  </div>`;
  attachQtip(box);
}
/* 股票式 OHLC 高低直條 + 均價點 + 事件標記 */
function ohlcSVG(es){const d=es.slice(-45);QDATA=d;QGEO=null;if(d.length<2)return"";
  const W=640,H=160,pad=10;const hi=Math.max(...d.map(e=>e[1].high)),lo=Math.min(...d.map(e=>e[1].low)),rng=(hi-lo)||1;
  const x=i=>pad+i*(W-2*pad)/(d.length-1);const y=v=>H-pad-(v-lo)/rng*(H-2*pad);
  const qmed=median(d.map(e=>e[1].qty).filter(Boolean))||0;QGEO={n:d.length,qmed};
  let bars="",marks="";
  for(let i=0;i<d.length;i++){const e=d[i][1];const prev=i?d[i-1][1].avg:e.avg;const c=e.avg>=prev?"#E4572E":"#7CC24A";const X=x(i);
    bars+=`<line x1="${X.toFixed(1)}" y1="${y(e.high).toFixed(1)}" x2="${X.toFixed(1)}" y2="${y(e.low).toFixed(1)}" stroke="${c}" stroke-width="2" opacity="0.5"/>`;
    bars+=`<circle cx="${X.toFixed(1)}" cy="${y(e.avg).toFixed(1)}" r="2.2" fill="${c}"/>`;
    if(qmed&&e.qty>qmed*1.8) marks+=`<polygon points="${(X-3).toFixed(1)},4 ${(X+3).toFixed(1)},4 ${X.toFixed(1)},11" fill="#E8862E"/>`;
    if(FEST[d[i][0]]) marks+=`<polygon points="${(X-3).toFixed(1)},13 ${(X+3).toFixed(1)},13 ${X.toFixed(1)},20" fill="#6FB0A6"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="高低價走勢，可點看當日">${bars}${marks}</svg>`;}
/* K線點擊：顯示當日日期與高/低/均價 + 事件 */
function attachQtip(box){
  const svg=box.querySelector(".qchart svg");const tip=box.querySelector("#qtip");
  if(!svg||!QGEO||!QDATA.length)return;
  const upd=ev=>{const r=svg.getBoundingClientRect();
    const cx=(ev.touches&&ev.touches[0])?ev.touches[0].clientX:ev.clientX;
    let frac=(cx-r.left)/r.width;frac=Math.max(0,Math.min(1,frac));const i=Math.round(frac*(QGEO.n-1));
    const e=QDATA[i];if(!e)return;const v=e[1],day=e[0];const evs=[];
    if(QGEO.qmed&&v.qty>QGEO.qmed*1.8)evs.push("🔺爆量");if(FEST[day])evs.push("🔹"+FEST[day]);
    tip.innerHTML=`<b>${day}</b>　高 ${v.high} / 低 ${v.low} / 均 <b>${v.avg}</b>　量 ${v.qty.toLocaleString()}`
      +(evs.length?`　<span class="ev">${evs.join(" ")}</span>`:"");
    if(ev.cancelable)ev.preventDefault();};
  svg.addEventListener("pointerdown",upd);
  svg.addEventListener("pointermove",e=>{if(e.buttons||e.pressure>0)upd(e);});
  svg.addEventListener("touchstart",upd,{passive:false});
  svg.addEventListener("touchmove",upd,{passive:false});
}

/* ══════ 田區搶收（前端即時計算） ══════ */
const DECC={NOW:"r",ADVISED:"o",WATCH:"y",NORMAL:"g"};const DECT={NOW:"立即搶收",ADVISED:"建議搶收",WATCH:"觀望",NORMAL:"照常"};
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function computeField(f){
  const now=todayISO();const T=growthDays(f.crop,f.plant);const age=daysBetween(f.plant,now);
  const maturity=clamp(age/T,0,2);const harvestISO=addDaysISO(f.plant,T);const daysToHarvest=Math.round(daysBetween(now,harvestISO));
  const phiOkISO=f.spray?addDaysISO(f.spray,+f.phi||0):null;const phiShort=phiOkISO?Math.ceil(daysBetween(now,phiOkISO)):0;
  const w=WEATHER||{active:false};const active=!!w.active;
  let decision="NORMAL",risk=0,deadline=null,dilemma=null,oppo=null,lines=[];
  const matPct=Math.round(maturity*100);
  if(active){
    const P=+w.invade_prob||0;const rain=+w.rain_24h_mm||0;const burst=+w.rain_1h_mm||0;const gust=+w.forecast_gust_ms||0;
    // 強度＝風(颱風逼近時雨未到也算) + 24hr雨 + 瞬間雨
    const iNorm=clamp(0.4*clamp(gust/50,0,1)+0.4*clamp(rain/300,0,1)+0.2*clamp(burst/60,0,1),0,1);
    const Wt=clamp(1+0.1*((+f.flood||1)-1),0.5,1.4);const V=V_CROP[f.crop]||.9;
    risk=Math.round(clamp(100*P*iNorm*Wt*V,0,100));
    // 時間軸
    if(w.eta_iso){const etaMs=Date.parse(w.eta_iso);const safeMs=etaMs-(12+ (FLOOD_ADV[f.flood]||0))*3600e3;deadline=safeMs;}
    const slackH=deadline?(deadline-Date.now())/3600e3:999;
    if(risk>=65&&slackH<=24)decision="NOW";else if(risk>=50)decision="ADVISED";else if(risk>=25)decision="WATCH";else decision="NORMAL";
    const immature=maturity<(MAT_MIN[f.crop]||.75);
    if(immature&&(decision==="NOW"||decision==="ADVISED")){decision="WATCH";lines.push(`成熟度僅 ${matPct}%，收了殘值低`);}
    lines.unshift(`雲林侵襲機率 ${Math.round(P*100)}%、24hr雨量 ${rain}mm${burst?`、瞬間雨量 ${burst}mm`:""}`);
    // 地勢：低窪→搶收；地勢高→價格機會
    if((+f.flood||1)>=4){lines.push(`地勢低窪（等級 ${f.flood}），泡水 48hr 起爛根，須提前收`);}
    else if((+f.flood||1)<=2&&P>=0.4&&rain>=150){oppo={};}
    // PHI 兩難
    if(phiShort>0){dilemma={days:phiShort};if(risk>=50)lines.push("兩難：現在收→農藥超標；不收→泡水滅田");}
  }else{
    lines.push(phiShort>0?`農藥安全期還差 ${phiShort} 天才可上市`:(f.spray?"農藥安全期已過，可上市":"目前無颱風，照常管理"));
  }
  return {f,decision,risk,deadline,dilemma,oppo,lines,maturity,matPct,harvestISO,daysToHarvest,phiShort,active};
}
let hTimers=[];
function renderHarvest(){
  const w=WEATHER||{active:false};const al=document.getElementById("hAlert");
  if(w.active){al.className="alert";al.innerHTML=`<span class="pulse"></span>
    <span class="big">颱風 <b>${w.name||"警報中"}</b> · ${w.warning||""}</span>
    <span class="k">雲林侵襲機率 <b>${w.invade_prob!=null?Math.round(w.invade_prob*100)+"%":"—"}</b></span>
    <span class="k">暴風圈到達 <b>${w.eta_text||"—"}</b></span>${w.rain_1h_mm?`<span class="k">瞬間雨量 <b>${w.rain_1h_mm}mm</b></span>`:""}`;}
  else if(w.tracking){al.className="alert track";al.innerHTML=`<span class="pulse"></span>
    <span class="big">🌀 颱風 <b>${w.name||"—"}</b> 追蹤中</span>
    <span class="k">${w.warning||"對雲林暫無直接威脅"}</span>
    ${w.min_dist_km!=null?`<span class="k">最近距離 <b>${w.min_dist_km} km</b></span>`:""}
    <span class="k">侵襲機率 <b>${w.invade_prob!=null?Math.round(w.invade_prob*100)+"%":"—"}</b></span>`;}
  else{al.className="alert calm";al.innerHTML=`<span class="pulse"></span><span class="big">目前<b>無颱風警報</b></span><span class="k">下方顯示各田採收進度</span>`;}
  const fields=getFields().map(computeField);
  if(w.active)fields.sort((a,b)=>b.risk-a.risk);
  const wrap=document.getElementById("hCards");wrap.innerHTML="";hTimers=[];
  if(!fields.length){wrap.innerHTML='<div class="empty">還沒有田區。點右上 ⚙️ → 我的田區 → 新增一塊田。</div>';return;}
  fields.forEach((r,i)=>{const c=DECC[r.decision];const el=document.createElement("div");el.className="fcard dec-"+c;
    const rw=r.risk>=65?["hi","高"]:r.risk>=40?["mid","中"]:["lo","低"];
    let mid="";
    if(r.active){
      mid=`<div class="line">滅田風險：<b class="${rw[0]}">${rw[1]}</b>（${r.risk}/100）· 成熟度 ${r.matPct}%</div>`;
      if(r.decision==="NOW"||r.decision==="ADVISED"){const tgt=r.deadline;
        mid+=`<div class="count" id="hc${i}"><div class="cl">⏳ 最晚開始搶收</div><div class="cd" id="cd${i}">--:--:--</div><div class="cn" id="cn${i}"></div></div>`;
        if(tgt)hTimers.push({i,target:tgt});}
    }else{
      mid=`<div class="line">成熟度 <b>${r.matPct}%</b> · 預計採收 <b>${r.harvestISO}</b>（約 ${r.daysToHarvest} 天後）</div>`;
    }
    const dil=r.dilemma?`<div class="dilemma"><div class="dh">⚠ 農藥安全期還差 ${r.dilemma.days} 天（收了不可上市）</div><div class="dt">現在收＝走加工殘值；不收＝恐泡水。</div></div>`:"";
    const opp=r.oppo?`<div class="oppo"><div class="oh">💰 地勢高、預期不淹的機會</div><div class="ot">周邊低窪田恐泡水減產，你這塊若撐住，災後行情看漲——可評估「不搶收、賭災後好價」。</div></div>`:"";
    const why=r.lines.length?`<div class="line">${r.lines[0]}${r.lines[1]?"；"+r.lines[1]:""}</div>`:"";
    el.innerHTML=`<div class="ctop"><span class="cid">${r.f.name} <small>${r.f.crop}</small></span><span class="pill dec-${c}">${DECT[r.decision]}</span></div>
      ${mid}${why}${dil}${opp}`;
    wrap.appendChild(el);});
  hTick();
}
function hTick(){const now=Date.now();hTimers.forEach(tm=>{const cd=document.getElementById("cd"+tm.i);if(!cd)return;
  const cn=document.getElementById("cn"+tm.i),box=cd.closest(".count");let s=Math.max(0,Math.floor((tm.target-now)/1000));
  const h=Math.floor(s/3600);s%=3600;cd.textContent=pad(h)+":"+pad(Math.floor(s/60))+":"+pad(s%60);
  const hl=(tm.target-now)/3600e3;box.classList.toggle("soon",hl<12&&hl>0);const d=new Date(tm.target);
  cn.textContent="最晚 "+(d.getMonth()+1)+"/"+d.getDate()+" "+pad(d.getHours())+":"+pad(d.getMinutes())+" 前開始收";});}
setInterval(hTick,1000);

/* ══════ 採收價預判 ══════ */
function renderForecast(){
  const crop=document.getElementById("fcCrop").value;const plant=document.getElementById("fcDate").value||todayISO();
  const box=document.getElementById("fcResult");
  const T=growthDays(crop,plant);const harvestISO=addDaysISO(plant,T);const hw=weekOf(harvestISO);
  const series=sortedEntries(seriesFor(crop));
  const month=+harvestISO.split("-")[1];const typ=month>=6&&month<=10;
  const riskHtml=`<div class="risk ${typ?"warn":"ok"}">${typ?"⚠ 採收落在颱風季（6–10月）：災前大家搶收會壓價，災後若減產則可能大漲——地勢高、能撐住的田較有機會賣好價。":"✓ 採收在非颱風季，價格相對穩定，可安心規劃。"}</div>`;
  const head=`<h3>${crop}｜預計採收 ${harvestISO}</h3>`;
  if(!series.length){box.innerHTML=`<div class="fcresult">${head}<div class="row">此作物在 ${MARKET} 目前<b>沒有行情資料</b>，無法推估。</div>${riskHtml}</div>`;return;}
  const near=series.filter(e=>{const d=Math.abs(weekOf(e[0])-hw);return d<=2||d>=50;}).map(e=>e[1].avg);
  let band,note;
  if(near.length>=5){const med=median(near),lo=pctile(near,.25),hi=pctile(near,.75);
    band=`${lo.toFixed(0)}–${hi.toFixed(0)}`;note=`近兩年<b>同期</b>中位價約 <b>${med.toFixed(1)}</b> 元/公斤（同期樣本 ${near.length} 天，生育期約 ${T} 天）`;}
  else{const recent=series.slice(-90).map(e=>e[1].avg);
    if(recent.length>=5){const med=median(recent),lo=pctile(recent,.25),hi=pctile(recent,.75);
      band=`${lo.toFixed(0)}–${hi.toFixed(0)}`;note=`⚠ 同期資料少（僅 ${near.length} 天，此作物在此季少見），改用<b>近三個月</b>行情粗估：中位約 <b>${med.toFixed(1)}</b> 元/公斤`;}
    else{box.innerHTML=`<div class="fcresult">${head}<div class="row">生育期約 <b>${T}</b> 天。此作物在 ${MARKET} <b>資料太少</b>，暫無法推估。</div>${riskHtml}</div>`;return;}}
  box.innerHTML=`<div class="fcresult">${head}<div class="band mono">${band} <span class="u">元/公斤</span></div>
    <div class="row">${note}</div>${riskHtml}</div>`;
}

/* ══════ 設定 UI ══════ */
let editingId=null;
function openSettings(){renderSettings();document.getElementById("modal").classList.add("on");}
function closeSettings(){document.getElementById("modal").classList.remove("on");}
function renderSettings(){
  applyFont();
  const ms=document.getElementById("mktSelect");ms.innerHTML="";
  marketNames().forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;if(m===MARKET)o.selected=true;ms.appendChild(o);});
  // 品項
  const wl=document.getElementById("watchList");wl.innerHTML="";const watch=watchCrops();
  watch.forEach(d=>{const row=document.createElement("div");row.className="listrow";
    row.innerHTML=`<span class="wn">${d}</span><span class="sp"><button class="rm" data-c="${d}">移除</button></span>`;wl.appendChild(row);});
  wl.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{let w=watchCrops().filter(c=>c!==b.dataset.c);S.setWatch(MARKET,w);
    if(CUR&&!w.includes(CUR)){CUR=null;document.getElementById("quote").innerHTML="";}renderSettings();renderBoard();});
  const addable=availableCrops().filter(c=>!watch.includes(c));const as=document.getElementById("addSelect");as.innerHTML="";
  addable.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;as.appendChild(o);});
  document.getElementById("addBtn").disabled=!addable.length;
  // 田區
  const fl=document.getElementById("fieldList");fl.innerHTML="";const fields=getFields();
  fields.forEach(f=>{const row=document.createElement("div");row.className="listrow";
    row.innerHTML=`<span class="wn">${f.name}</span><span class="sp"><button class="ed" data-id="${f.id}">編輯</button><button class="rm" data-id="${f.id}">刪除</button></span>
      <span class="ws">${f.crop}·播種 ${f.plant}·淹水等級 ${f.flood}${f.spray?"·施藥 "+f.spray+"(PHI"+f.phi+")":""}</span>`;fl.appendChild(row);});
  fl.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{S.setFields(getFields().filter(x=>x.id!==b.dataset.id));renderSettings();renderHarvest();});
  fl.querySelectorAll(".ed").forEach(b=>b.onclick=()=>openFieldForm(getFields().find(x=>x.id===b.dataset.id)));
  // 作物下拉（田區表單 + 採收預判）
  [document.getElementById("ffCrop"),document.getElementById("fcCrop")].forEach(sel=>{if(sel.options.length)return;
    cropList().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});});
}
function openFieldForm(f){editingId=f?f.id:null;const ff=document.getElementById("fieldForm");ff.classList.add("on");
  document.getElementById("ffName").value=f?f.name:"";document.getElementById("ffCrop").value=f?f.crop:cropList()[0];
  document.getElementById("ffPlant").value=f?f.plant:todayISO();document.getElementById("ffFlood").value=f?f.flood:4;
  document.getElementById("ffSpray").value=f?(f.spray||""):"";document.getElementById("ffPhi").value=f?(f.phi||""):"";
  ff.scrollIntoView({behavior:"smooth",block:"nearest"});}
function saveField(){const name=document.getElementById("ffName").value.trim()||"未命名田";
  const rec={id:editingId||("F"+Date.now().toString(36)),name,crop:document.getElementById("ffCrop").value,
    plant:document.getElementById("ffPlant").value||todayISO(),flood:+document.getElementById("ffFlood").value,
    spray:document.getElementById("ffSpray").value||"",phi:+document.getElementById("ffPhi").value||0};
  let fields=getFields();const idx=fields.findIndex(x=>x.id===rec.id);if(idx>=0)fields[idx]=rec;else fields.push(rec);
  S.setFields(fields);editingId=null;document.getElementById("fieldForm").classList.remove("on");renderSettings();renderHarvest();}

document.getElementById("fsRow").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;S.fs=b.dataset.v;applyFont();});
document.getElementById("mktSelect").addEventListener("change",async e=>{MARKET=e.target.value;S.market=MARKET;CUR=null;
  document.getElementById("quote").innerHTML="";await loadMarket(MARKET);renderBoard();renderSettings();
  const l=watchCrops();if(l.length)selectCrop(l[0]);});
document.getElementById("addBtn").addEventListener("click",()=>{const v=document.getElementById("addSelect").value;if(!v)return;
  const w=watchCrops();if(!w.includes(v))w.push(v);S.setWatch(MARKET,w);renderSettings();renderBoard();});
document.getElementById("fieldAddBtn").addEventListener("click",()=>openFieldForm(null));
document.getElementById("ffSave").addEventListener("click",saveField);
document.getElementById("gear").addEventListener("click",openSettings);
document.getElementById("closeSet").addEventListener("click",closeSettings);
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeSettings();});
document.getElementById("fcGo").addEventListener("click",renderForecast);

/* ══════ 分頁 ══════ */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  const m=t.dataset.t;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x===t));
  ["market","harvest","forecast"].forEach(v=>document.getElementById("view-"+v).classList.toggle("on",v===m));
  if(m==="forecast"&&!document.getElementById("fcCrop").options.length){cropList().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;document.getElementById("fcCrop").appendChild(o);});document.getElementById("fcDate").value=todayISO();}
}));

/* ══════ 啟動 ══════ */
(async function(){
  applyFont();
  const vl=document.getElementById("verLabel");if(vl)vl.textContent=VERSION;
  const {index,live}=await loadIndex();INDEX=index;
  document.getElementById("updated").textContent="更新："+(index.updated||"—");
  const mode=document.getElementById("mode");mode.className="badge "+(live?"live":"demo");mode.textContent=live?"實際資料":"示範資料";
  const names=marketNames();MARKET=(S.market&&names.includes(S.market))?S.market:names[0];
  await loadMarket(MARKET);
  renderBoard();const list=watchCrops();if(list.length)selectCrop(list[0]);
  WEATHER=await loadWeather();renderHarvest();
  // 採收預判作物下拉
  const fc=document.getElementById("fcCrop");cropList().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;fc.appendChild(o);});
  document.getElementById("fcDate").value=todayISO();
})();
</script>
