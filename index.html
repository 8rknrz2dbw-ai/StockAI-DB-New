<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>二崙葉菜行情室 · 搶收預判</title>
<style>
  /* ── 字級：整頁以 rem 縮放；預設「大」給長輩看 ── */
  :root{ font-size:19px; }
  :root[data-fs="s"]{ font-size:16px; }
  :root[data-fs="m"]{ font-size:19px; }
  :root[data-fs="l"]{ font-size:23px; }
  :root[data-fs="xl"]{ font-size:28px; }

  :root{
    --bg:#12160E; --panel:#1B2015; --panel2:#232A1B; --line:#313A22;
    --leaf:#A6C955; --leaf-dim:#6E8F3C; --paper:#EFEAD8; --muted:#9aa27a;
    --g:#7CC24A; --y:#F2B705; --o:#E8862E; --r:#E4572E; --cool:#6FB0A6;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--paper);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;}
  .mono{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;}
  :focus-visible{outline:3px solid var(--leaf);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

  .wrap{max-width:760px;margin:0 auto;padding:0.9rem 0.8rem 3rem;}

  /* ── 抬頭 ── */
  header{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;
    padding-bottom:0.7rem;border-bottom:1px solid var(--line);}
  header h1{font-size:1.4rem;font-weight:900;margin:0;letter-spacing:.5px;line-height:1.2;}
  header h1 .dot{color:var(--leaf);}
  .gear{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    width:2.4rem;height:2.4rem;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;
    justify-content:center;flex:0 0 auto;}
  .gear:hover{background:var(--line);}
  .subline{width:100%;display:flex;gap:0.5rem 0.8rem;flex-wrap:wrap;align-items:center;
    font-size:0.72rem;color:var(--muted);margin-top:0.3rem;}
  .badge{padding:0.15rem 0.55rem;border-radius:999px;font-size:0.7rem;font-weight:700;
    border:1px solid var(--line);white-space:nowrap;}
  .badge.demo{color:var(--y);border-color:#5a4d13;background:#231d07;}
  .badge.live{color:var(--leaf);border-color:#2f4a1c;background:#182312;}

  /* ── 分頁 ── */
  .tabs{display:flex;gap:0.5rem;margin:0.9rem 0;}
  .tab{flex:1;background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:0.7rem 0.5rem;border-radius:999px;font-size:1.05rem;font-weight:800;}
  .tab.on{color:var(--bg);background:var(--leaf);border-color:var(--leaf);}
  .view{display:none;} .view.on{display:block;}

  /* ── 行情看板 ── */
  .mkt-label{font-size:0.8rem;color:var(--muted);margin:0.2rem 0 0.6rem;}
  .mkt-label b{color:var(--paper);}
  .board{display:flex;flex-direction:column;gap:0.55rem;}
  .prow{display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:0.8rem 0.9rem;text-align:left;color:inherit;width:100%;}
  .prow.on{box-shadow:inset 4px 0 0 var(--leaf);background:var(--panel2);}
  .prow .dot{width:0.75rem;height:0.75rem;border-radius:50%;flex:0 0 auto;}
  .prow .dot.up{background:var(--r);} .prow .dot.dn{background:var(--g);} .prow .dot.mid{background:var(--y);}
  .prow .nm{font-size:1.15rem;font-weight:800;}
  .prow .nm small{display:block;font-size:0.65rem;color:var(--muted);font-weight:400;margin-top:0.1rem;}
  .prow .px{margin-left:auto;text-align:right;white-space:nowrap;}
  .prow .px .v{font-size:1.6rem;font-weight:900;}
  .prow .px .u{font-size:0.7rem;color:var(--muted);}
  .tag{font-size:0.72rem;font-weight:800;padding:0.15rem 0.5rem;border-radius:999px;white-space:nowrap;}
  .tag.up{color:#2a1409;background:var(--r);} .tag.dn{color:#0e1a08;background:var(--g);}
  .tag.mid{color:#2a2306;background:var(--y);}

  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:var(--radius);
    padding:1.2rem;text-align:center;color:var(--muted);font-size:0.9rem;}

  /* ── 品項細節 ── */
  .detail{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:1rem;}
  .detail h3{margin:0 0 0.5rem;font-size:1.15rem;}
  .detail .big{font-size:2.3rem;font-weight:900;line-height:1;}
  .detail .big .u{font-size:0.8rem;color:var(--muted);font-weight:400;}
  .detail .say{font-size:1rem;margin-top:0.5rem;font-weight:700;}
  .detail .say.up{color:var(--r);} .detail .say.dn{color:var(--leaf);} .detail .say.mid{color:var(--y);}
  .detail .note{font-size:0.8rem;color:var(--muted);margin-top:0.35rem;}
  .trend{margin-top:0.8rem;}
  .trend svg{width:100%;height:5.5rem;display:block;}
  .trend .cap{font-size:0.72rem;color:var(--muted);margin-top:0.25rem;}

  /* ── 搶收預判 ── */
  .alert{border:1px solid #5a2c1f;border-radius:var(--radius);
    background:linear-gradient(90deg,rgba(228,87,46,.18),rgba(228,87,46,.05) 60%,transparent);
    padding:0.9rem 1rem;display:flex;flex-wrap:wrap;align-items:center;gap:0.3rem 1rem;}
  .alert.calm{border-color:#2f4a1c;background:linear-gradient(90deg,rgba(124,194,74,.14),transparent 60%);}
  .alert .pulse{width:0.7rem;height:0.7rem;border-radius:50%;background:var(--r);flex:0 0 auto;
    box-shadow:0 0 0 0 rgba(228,87,46,.6);animation:pulse 1.8s infinite;}
  .alert.calm .pulse{background:var(--g);animation:none;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(228,87,46,.55)}70%{box-shadow:0 0 0 0.6rem rgba(228,87,46,0)}100%{box-shadow:0 0 0 0 rgba(228,87,46,0)}}
  .alert .big{font-size:1.05rem;font-weight:800;width:100%;}
  .alert .big b{color:#F6C6B4;} .alert.calm .big b{color:var(--leaf);}
  .alert .k{font-size:0.8rem;color:var(--muted);}
  .alert .k b{color:var(--paper);}

  .overview{margin-top:0.9rem;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:0.9rem 1rem;}
  .overview .tally{display:flex;gap:0.5rem 1.1rem;flex-wrap:wrap;}
  .overview .t{display:flex;align-items:center;gap:0.4rem;font-size:0.95rem;}
  .overview .t .n{font-size:1.4rem;font-weight:900;}
  .lamp{width:0.75rem;height:0.75rem;border-radius:50%;flex:0 0 auto;}
  .lamp.r{background:var(--r);} .lamp.o{background:var(--o);} .lamp.y{background:var(--y);} .lamp.g{background:var(--g);}
  .overview .pick{font-size:0.82rem;color:var(--muted);margin-top:0.5rem;}
  .overview .pick b{color:var(--paper);}

  .sec-t{font-size:1.05rem;font-weight:800;margin:1.2rem 0 0.6rem;}
  .sched{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:0.9rem;}
  .sched .sum{font-size:0.9rem;font-weight:700;margin:0 0 0.7rem;}
  .sched .sum b{color:var(--leaf);}
  .srow{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;border:1px solid var(--line);
    border-radius:12px;padding:0.6rem 0.7rem;margin-bottom:0.5rem;}
  .srow:last-child{margin-bottom:0;}
  .srow.bad{border-color:#5a2c1f;background:rgba(228,87,46,.08);}
  .srow .rk{width:1.3rem;text-align:center;color:var(--muted);font-weight:800;flex:0 0 auto;}
  .srow .snm{font-weight:800;font-size:0.98rem;}
  .srow .snm small{color:var(--muted);font-weight:400;}
  .srow .team{font-size:0.72rem;font-weight:700;color:var(--bg);background:var(--cool);padding:0.1rem 0.5rem;border-radius:999px;}
  .srow .tw{font-size:0.85rem;color:var(--paper);}
  .srow .ok{margin-left:auto;color:var(--g);font-weight:800;font-size:0.82rem;}
  .srow .no{margin-left:auto;color:var(--r);font-weight:800;font-size:0.82rem;}
  .srow .snote{flex-basis:100%;font-size:0.75rem;color:#F6C6B4;}

  .cards{display:flex;flex-direction:column;gap:0.7rem;}
  .fcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:0.9rem;position:relative;overflow:hidden;}
  .fcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--dec,var(--muted));}
  .fcard.dec-r{--dec:var(--r)} .fcard.dec-o{--dec:var(--o)} .fcard.dec-y{--dec:var(--y)} .fcard.dec-g{--dec:var(--g)}
  .fcard .ctop{display:flex;align-items:baseline;gap:0.5rem;flex-wrap:wrap;}
  .fcard .cid{font-size:1.1rem;font-weight:800;}
  .fcard .cid small{color:var(--muted);font-weight:400;font-size:0.75rem;}
  .fcard .pill{margin-left:auto;font-size:0.85rem;font-weight:800;padding:0.25rem 0.7rem;border-radius:999px;
    color:#12160E;background:var(--dec);white-space:nowrap;}
  .fcard .pill.dec-y{color:#2a2306;}
  .fcard .riskword{font-size:0.85rem;color:var(--muted);margin-top:0.4rem;}
  .fcard .riskword b.hi{color:var(--r);} .fcard .riskword b.mid{color:var(--o);} .fcard .riskword b.lo{color:var(--g);}
  .count{margin-top:0.6rem;border:1px solid var(--line);border-radius:12px;padding:0.6rem 0.7rem;background:var(--panel2);}
  .count .cl{font-size:0.72rem;color:var(--muted);}
  .count .cd{font-size:1.9rem;font-weight:900;letter-spacing:1px;line-height:1.1;}
  .count.soon .cd{color:var(--r);animation:blink 1.1s steps(2,jump-none) infinite;}
  .count .cn{font-size:0.72rem;color:var(--muted);margin-top:0.15rem;}
  .count.none .cd{font-size:1rem;color:var(--muted);font-weight:700;}
  @keyframes blink{50%{opacity:.45}}
  .dilemma{margin-top:0.6rem;border:1px solid #6a5410;background:#241d06;border-radius:12px;padding:0.6rem 0.7rem;}
  .dilemma .dh{color:var(--y);font-weight:800;font-size:0.92rem;}
  .dilemma .dt{font-size:0.8rem;color:#e7dcb4;margin-top:0.25rem;}
  .fcard .why{font-size:0.82rem;color:var(--muted);margin-top:0.55rem;line-height:1.5;}

  .foot{margin-top:1.6rem;color:var(--muted);font-size:0.72rem;line-height:1.7;
    border-top:1px solid var(--line);padding-top:0.9rem;}

  /* ── 設定 modal ── */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;
    align-items:flex-end;justify-content:center;}
  .modal.on{display:flex;}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;
    width:100%;max-width:760px;max-height:88vh;overflow-y:auto;padding:1.1rem 1rem 1.6rem;}
  @media(min-width:520px){.modal{align-items:center;} .sheet{border-radius:20px;}}
  .sheet h2{margin:0 0 0.2rem;font-size:1.25rem;font-weight:900;display:flex;align-items:center;}
  .sheet .close{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    width:2.1rem;height:2.1rem;border-radius:50%;font-size:1.1rem;}
  .setblk{margin-top:1.2rem;}
  .setblk h4{margin:0 0 0.5rem;font-size:0.95rem;color:var(--muted);font-weight:700;letter-spacing:.5px;}
  .fsrow{display:flex;gap:0.5rem;}
  .fsrow button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    padding:0.6rem 0.3rem;border-radius:12px;font-weight:800;}
  .fsrow button[data-v="s"]{font-size:0.85rem;} .fsrow button[data-v="m"]{font-size:1rem;}
  .fsrow button[data-v="l"]{font-size:1.2rem;} .fsrow button[data-v="xl"]{font-size:1.45rem;}
  .fsrow button.on{background:var(--leaf);color:var(--bg);border-color:var(--leaf);}
  select.mkt{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    padding:0.65rem 0.7rem;border-radius:12px;font-size:1rem;font-family:inherit;}
  .watchlist{display:flex;flex-direction:column;gap:0.45rem;margin-top:0.2rem;}
  .witem{display:flex;align-items:center;gap:0.6rem;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:0.55rem 0.7rem;}
  .witem .wn{font-weight:700;font-size:1rem;}
  .witem .rm{margin-left:auto;background:transparent;border:1px solid #5a2c1f;color:var(--r);
    border-radius:999px;padding:0.2rem 0.7rem;font-size:0.82rem;font-weight:800;}
  .addrow{display:flex;gap:0.5rem;margin-top:0.6rem;flex-wrap:wrap;}
  .addrow select{flex:1;min-width:8rem;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    padding:0.55rem 0.6rem;border-radius:12px;font-size:0.95rem;font-family:inherit;}
  .addrow button{background:var(--leaf);color:var(--bg);border:0;border-radius:12px;padding:0.55rem 1rem;font-weight:800;}
  .addrow button:disabled{opacity:.4;}
  .hintline{font-size:0.75rem;color:var(--muted);margin-top:0.5rem;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>二崙葉菜行情室<span class="dot">.</span></h1>
    <button class="gear" id="gear" aria-label="設定">⚙️</button>
    <div class="subline">
      <span id="updated">—</span>
      <span id="mode" class="badge demo">示範資料</span>
      <span>西螺果菜市場 · 拍賣行情 ＋ 颱風搶收預判</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab on" id="tab-market">行情看板</button>
    <button class="tab" id="tab-harvest">搶收預判</button>
  </nav>

  <!-- 行情看板 -->
  <div class="view on" id="view-market">
    <p class="mkt-label">市場：<b id="mktName">—</b>　·　點品項看走勢</p>
    <div class="board" id="board"></div>
    <div id="detail"></div>
  </div>

  <!-- 搶收預判 -->
  <div class="view" id="view-harvest">
    <div class="alert" id="hAlert"></div>
    <div class="overview" id="hOverview"></div>
    <div id="hSchedWrap" style="display:none">
      <div class="sec-t">全區搶收排程（人力調度）</div>
      <div class="sched" id="hSchedule"></div>
    </div>
    <div class="sec-t">各田搶收預判</div>
    <div class="cards" id="hCards"></div>
  </div>

  <p class="foot">
    價格為農業部「農產品交易行情」公開資料；颱風/雨量為中央氣象署資料。抓不到時顯示示範資料，不當機。<br>
    設定（字體大小、市場、品項增刪）都在右上齒輪 ⚙️ 裡。
  </p>
</div>

<!-- 設定 -->
<div class="modal" id="modal">
  <div class="sheet" role="dialog" aria-label="設定">
    <h2>設定 <button class="close" id="closeSet" aria-label="關閉">✕</button></h2>

    <div class="setblk">
      <h4>字體大小</h4>
      <div class="fsrow" id="fsRow">
        <button data-v="s">小</button>
        <button data-v="m">中</button>
        <button data-v="l">大</button>
        <button data-v="xl">特大</button>
      </div>
    </div>

    <div class="setblk">
      <h4>果菜市場</h4>
      <select class="mkt" id="mktSelect"></select>
    </div>

    <div class="setblk">
      <h4>我的品項（點「移除」隱藏、下方可新增）</h4>
      <div class="watchlist" id="watchList"></div>
      <div class="addrow">
        <select id="addSelect"></select>
        <button id="addBtn">＋ 新增</button>
      </div>
      <p class="hintline">只會顯示你選的品項；新增清單來自這個市場目前有行情的葉菜。</p>
    </div>
  </div>
</div>

<script>
/* ═══════════ 動態 ghBase ═══════════ */
function resolveGhBase(){
  const {origin, pathname, hostname} = location;
  if (hostname.endsWith("github.io")) {
    const seg = pathname.split("/").filter(Boolean);
    return origin + (seg.length ? "/" + seg[0] : "");
  }
  return ".";
}
/* ═══════════ 小工具 ═══════════ */
function doyOf(iso){const [Y,M,D]=iso.split("-").map(Number);
  return Math.floor((Date.UTC(Y,M-1,D)-Date.UTC(Y,0,0))/86400000);}
function median(a){const s=[...a].sort((x,y)=>x-y);const m=s.length>>1;
  return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function pad(n){return String(n).padStart(2,"0");}

/* ═══════════ 設定（localStorage） ═══════════ */
const S = {
  get fs(){return localStorage.getItem("vs_fs")||"l";},
  set fs(v){localStorage.setItem("vs_fs",v);},
  get market(){return localStorage.getItem("vs_market")||"";},
  set market(v){localStorage.setItem("vs_market",v);},
  watch(mk){try{return JSON.parse(localStorage.getItem("vs_watch_"+mk));}catch(e){return null;}},
  setWatch(mk,arr){localStorage.setItem("vs_watch_"+mk,JSON.stringify(arr));},
};
function applyFont(){document.documentElement.setAttribute("data-fs",S.fs);
  document.querySelectorAll("#fsRow button").forEach(b=>b.classList.toggle("on",b.dataset.v===S.fs));}

/* ═══════════ 價格資料 ═══════════ */
async function loadPrices(){
  try{
    const res=await fetch(`${resolveGhBase()}/veg_prices.json`,{cache:"no-store"});
    if(!res.ok) throw 0;
    const j=await res.json();
    if(!j||!j.data||!Array.isArray(j.markets)||!j.markets.length||!j.crop_map||!j.data[j.markets[0]]) throw 0;
    return {payload:j, live:true};
  }catch(e){ return {payload:makeDemo(), live:false}; }
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeDemo(){
  const rnd=mulberry32(20250704);
  // 展開成完整葉菜清單，讓「新增/移除品項」有東西可選
  const M={
    "青江白菜":{b:22,a:5,pk:20,v:1500,sp:[7,8,9]},"芥藍":{b:30,a:6,pk:15,v:900,sp:[8,9]},
    "菠菜":{b:34,a:18,pk:200,v:800,hole:0.6,sp:[]},"小白菜":{b:20,a:6,pk:210,v:1800,sp:[7,8,9]},
    "空心菜":{b:18,a:5,pk:200,v:1600,sp:[7,8]},"甘藷葉":{b:16,a:4,pk:200,v:1200,sp:[]},
    "莧菜":{b:20,a:5,pk:200,v:700,sp:[7,8]},"茼蒿":{b:28,a:10,pk:20,v:600,hole:0.4,sp:[]},
    "油菜":{b:19,a:5,pk:30,v:800,sp:[]},"萵苣菜":{b:26,a:7,pk:25,v:900,sp:[]},"芥菜":{b:22,a:6,pk:20,v:500,sp:[]},
  };
  const today=new Date(); const start=new Date(today); start.setFullYear(start.getFullYear()-1);
  function series(m){const s={};
    for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
      const iso=d.toISOString().slice(0,10); const mon=d.getMonth()+1; const doy=doyOf(iso);
      let gp=0.08+((m.hole&&mon>=6&&mon<=9)?m.hole:0); if(rnd()<gp)continue;
      const seas=Math.cos((doy-m.pk)/365*2*Math.PI);
      let px=m.b+m.a*seas+(rnd()-0.5)*4, qty=m.v*(1.1-0.4*seas)*(0.7+rnd()*0.6);
      if(m.sp.includes(mon)&&rnd()<0.03){px*=1.8+rnd();qty*=0.35;} px=Math.max(6,px);
      s[iso]={avg:+px.toFixed(1),high:+(px*1.15).toFixed(1),mid:+px.toFixed(1),low:+(px*0.85).toFixed(1),qty:+qty.toFixed(0)};
    } return s;}
  const xiluo={}, taipei={};
  for(const [n,m] of Object.entries(M)) xiluo[n]=series(m);
  ["青江白菜","小白菜","空心菜","菠菜"].forEach(n=>taipei[n]=series(M[n]));
  const crop_map={"青江菜":"青江白菜","芥藍菜":"芥藍","菠菜":"菠菜","小白菜":"小白菜",
    "空心菜":"空心菜","地瓜葉":"甘藷葉","莧菜":"莧菜","茼蒿":"茼蒿","油菜":"油菜","萵苣(A菜)":"萵苣菜","芥菜":"芥菜"};
  return {updated:new Date().toISOString().slice(0,16).replace("T"," "),markets:["西螺","台北一"],
    crop_map,data:{"西螺":xiluo,"台北一":taipei}};
}

/* ═══════════ 狀態 ═══════════ */
let PRICES=null, MARKET="", CUR=null;

function wholesaleOf(disp){return PRICES.crop_map[disp];}
function seriesFor(disp){const w=wholesaleOf(disp);return (w&&PRICES.data[MARKET]&&PRICES.data[MARKET][w])||{};}
function sortedEntries(s){return Object.entries(s).sort((a,b)=>a[0]<b[0]?-1:1);}
/* 這個市場「有行情」的展示品項（依 crop_map 順序） */
function availableCrops(){
  const d=PRICES.data[MARKET]||{};
  return Object.keys(PRICES.crop_map).filter(disp=>{
    const w=PRICES.crop_map[disp]; return d[w]&&Object.keys(d[w]).length;});
}
function watchCrops(){
  let w=S.watch(MARKET); const avail=availableCrops();
  if(!Array.isArray(w)) return avail.slice();               // 預設全顯示
  w=w.filter(c=>avail.includes(c));                          // 濾掉已無資料的
  return w.length?w:avail.slice();
}

/* 貴/便宜判斷：最新均價 vs 近90日中位 */
function priceView(disp){
  const es=sortedEntries(seriesFor(disp)); if(!es.length) return null;
  const last=es[es.length-1]; const lastAvg=last[1].avg;
  const recent=es.slice(-90).map(e=>e[1].avg);
  const base=median(recent); const diff=base?((lastAvg-base)/base*100):0;
  let cls,say;
  if(diff>10){cls="up";say="偏貴";} else if(diff<-10){cls="dn";say="偏便宜";} else {cls="mid";say="正常";}
  return {date:last[0],avg:lastAvg,diff,cls,say,es};
}

/* ═══════════ 看板 ═══════════ */
function renderBoard(){
  document.getElementById("mktName").textContent=MARKET;
  const el=document.getElementById("board"); el.innerHTML="";
  const list=watchCrops();
  if(!list.length){el.innerHTML='<div class="empty">尚未選擇品項。點右上 ⚙️ → 我的品項 → 新增。</div>';return;}
  list.forEach(disp=>{
    const pv=priceView(disp);
    const b=document.createElement("button"); b.className="prow"+(disp===CUR?" on":"");
    if(pv){
      b.innerHTML=`<span class="dot ${pv.cls}"></span>
        <span class="nm">${disp}</span>
        <span class="px"><span class="v mono">${pv.avg.toFixed(1)}</span> <span class="u">元/公斤</span></span>
        <span class="tag ${pv.cls}">${pv.say}</span>`;
    }else{
      b.innerHTML=`<span class="dot mid"></span><span class="nm">${disp}</span>
        <span class="px"><span class="v">—</span></span>`;
    }
    b.onclick=()=>selectCrop(disp);
    el.appendChild(b);
  });
}
function selectCrop(disp){CUR=disp;renderBoard();renderDetail(disp);}

function renderDetail(disp){
  const box=document.getElementById("detail"); const pv=priceView(disp);
  if(!pv){box.innerHTML="";return;}
  const arrow=pv.diff>10?"▲":pv.diff<-10?"▼":"＝";
  box.innerHTML=`<div class="detail">
    <h3>${disp}</h3>
    <div class="big mono">${pv.avg.toFixed(1)} <span class="u">元/公斤</span></div>
    <div class="say ${pv.cls}">${arrow} ${pv.say}（比近三個月常態 ${pv.diff>=0?"+":""}${pv.diff.toFixed(0)}%）</div>
    <div class="note">最新行情日期 ${pv.date}</div>
    <div class="trend">${trendSVG(pv.es)}<div class="cap">近 60 個交易日 均價走勢</div></div>
  </div>`;
}
/* 自繪 SVG 走勢（不依賴外部 CDN） */
function trendSVG(es){
  const pts=es.slice(-60).map(e=>e[1].avg); if(pts.length<2) return "";
  const W=600,H=110,pad=6; const lo=Math.min(...pts),hi=Math.max(...pts),rng=(hi-lo)||1;
  const x=i=>pad+i*(W-2*pad)/(pts.length-1);
  const y=v=>H-pad-(v-lo)/rng*(H-2*pad);
  const line=pts.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  const area=line+` L${x(pts.length-1).toFixed(1)} ${H-pad} L${x(0).toFixed(1)} ${H-pad} Z`;
  const up=pts[pts.length-1]>=pts[0];
  const col=up?"#E4572E":"#7CC24A";
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="均價走勢">
    <path d="${area}" fill="${col}" opacity="0.12"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(pts.length-1).toFixed(1)}" cy="${y(pts[pts.length-1]).toFixed(1)}" r="4" fill="${col}"/>
  </svg>`;
}

/* ═══════════ 搶收預判 ═══════════ */
const DEC={HARVEST_NOW:{c:"r",t:"立即搶收"},HARVEST_ADVISED:{c:"o",t:"建議搶收"},WATCH:{c:"y",t:"觀望"},NORMAL:{c:"g",t:"照常"}};
let ADV=null, hTimers=[];
async function loadAdvisory(){
  try{
    const res=await fetch(`${resolveGhBase()}/harvest_advisory.json`,{cache:"no-store"});
    if(!res.ok) throw 0; const j=await res.json();
    if(!j||!Array.isArray(j.fields)) throw 0; return j;
  }catch(e){ return makeAdvDemo(); }
}
function makeAdvDemo(){
  const iso=h=>new Date(Date.now()+h*3600e3).toISOString();
  return {updated:new Date().toISOString().slice(0,16).replace("T"," "),
    typhoon:{name:"克蘿莎 KROSA",warning:"海上陸上颱風警報中",invade_prob:0.70,eta_text:"約 40 小時後",rain_24h_mm:300,active:true},
    schedule:{teams:2,summary:"2 隊人力：可救 3 塊；YL-A12 來不及完收，建議部分搶收/保田。",items:[
      {field_id:"YL-C03",crop:"芥藍菜",risk_score:71,team:1,start:iso(0.2),finish:iso(6),feasible:true},
      {field_id:"YL-B07",crop:"小白菜",risk_score:55,team:2,start:iso(0.2),finish:iso(5),feasible:true},
      {field_id:"YL-F14",crop:"奶油白菜",risk_score:52,team:2,start:iso(5),finish:iso(11),feasible:true},
      {field_id:"YL-A12",crop:"青江菜",risk_score:64,team:null,start:null,finish:null,feasible:false,note:"來不及完收 → 建議部分搶收/保田"}]},
    fields:[
      {field_id:"YL-A12",crop:"青江菜",decision:"HARVEST_NOW",risk_score:64,harvest_deadline:iso(25),
        dilemma:{days_short:3,chemical:"陶斯松"},reasons:["低窪田積水風險高，暴風圈 48h 到達機率 70%"]},
      {field_id:"YL-C03",crop:"芥藍菜",decision:"HARVEST_NOW",risk_score:71,harvest_deadline:iso(11),
        reasons:["中長期作物曝險最久，人手僅能收約 60% 面積"]},
      {field_id:"YL-B07",crop:"小白菜",decision:"HARVEST_ADVISED",risk_score:55,harvest_deadline:iso(40),
        reasons:["成熟度足、可合法上市，仍有排工餘裕"]},
      {field_id:"YL-D21",crop:"菠菜",decision:"WATCH",risk_score:38,harvest_deadline:null,
        reasons:["路徑未定、成熟度不足，先盯預報"]},
      {field_id:"YL-E09",crop:"青江菜",decision:"NORMAL",risk_score:18,harvest_deadline:null,
        reasons:["地勢高、排水良好，按原計畫管理"]}]};
}
function riskWord(r){if(r>=65)return['hi','高'];if(r>=40)return['mid','中'];return['lo','低'];}

function renderHarvest(){
  const fields=[...ADV.fields].sort((a,b)=>{
    const ta=a.harvest_deadline?new Date(a.harvest_deadline).getTime():Infinity;
    const tb=b.harvest_deadline?new Date(b.harvest_deadline).getTime():Infinity;
    if(b.risk_score!==a.risk_score) return b.risk_score-a.risk_score; return ta-tb;});
  // 警報帶
  const ty=ADV.typhoon||{}; const al=document.getElementById("hAlert");
  if(ty.active){al.className="alert";
    al.innerHTML=`<span class="pulse"></span>
      <span class="big">颱風 <b>${ty.name||"—"}</b> · ${ty.warning||""}</span>
      <span class="k">雲林侵襲機率 <b>${ty.invade_prob!=null?Math.round(ty.invade_prob*100)+"%":"—"}</b></span>
      <span class="k">暴風圈到達 <b>${ty.eta_text||"—"}</b></span>`;
  }else{al.className="alert calm";
    al.innerHTML=`<span class="pulse"></span><span class="big">目前<b>無颱風警報</b></span><span class="k">各田按原計畫管理</span>`;}
  // 總覽
  const cnt={r:0,o:0,y:0,g:0}; fields.forEach(f=>cnt[(DEC[f.decision]||{c:"g"}).c]++);
  const picks=fields.filter(f=>f.harvest_deadline).slice(0,2).map(f=>f.field_id);
  document.getElementById("hOverview").innerHTML=`
    <div class="tally">
      <span class="t"><span class="lamp r"></span><span class="n mono">${cnt.r}</span> 立即</span>
      <span class="t"><span class="lamp o"></span><span class="n mono">${cnt.o}</span> 建議</span>
      <span class="t"><span class="lamp y"></span><span class="n mono">${cnt.y}</span> 觀望</span>
      <span class="t"><span class="lamp g"></span><span class="n mono">${cnt.g}</span> 照常</span>
    </div>
    <div class="pick">共 <b>${fields.length}</b> 塊田${picks.length?`　·　建議先收 <b>${picks.join("、")}</b>`:""}</div>`;
  // 排程
  renderSchedule(ADV.schedule);
  // 卡片
  const wrap=document.getElementById("hCards"); wrap.innerHTML=""; hTimers=[];
  fields.forEach((f,i)=>{
    const c=(DEC[f.decision]||{c:"g"}).c, t=(DEC[f.decision]||{}).t||"—";
    const el=document.createElement("div"); el.className="fcard dec-"+c;
    const tgt=f.harvest_deadline?new Date(f.harvest_deadline).getTime():null;
    const [rc,rw]=riskWord(f.risk_score);
    let count = tgt
      ? `<div class="count" id="hc${i}"><div class="cl">⏳ 最晚開始搶收</div><div class="cd" id="cd${i}">--:--:--</div><div class="cn" id="cn${i}"></div></div>`
      : `<div class="count none"><div class="cl">搶收 deadline</div><div class="cd">無迫近時窗</div></div>`;
    let dil = f.dilemma
      ? `<div class="dilemma"><div class="dh">⚠ 距安全採收期還差 ${f.dilemma.days_short} 天（${f.dilemma.chemical}）</div>
         <div class="dt">現在收＝不可上市（走加工）；不收＝恐泡水滅田。</div></div>` : "";
    const why=(f.reasons&&f.reasons[0])?`<div class="why">${f.reasons[0]}</div>`:"";
    el.innerHTML=`<div class="ctop"><span class="cid">${f.field_id} <small>${f.crop}</small></span>
      <span class="pill dec-${c}">${t}</span></div>
      <div class="riskword">滅田風險：<b class="${rc}">${rw}</b>（${f.risk_score}/100）</div>
      ${count}${dil}${why}`;
    if(tgt) hTimers.push({i,target:tgt});
    wrap.appendChild(el);
  });
  hTick();
}
function renderSchedule(sch){
  const wrap=document.getElementById("hSchedWrap"), box=document.getElementById("hSchedule");
  if(!sch||!Array.isArray(sch.items)||!sch.items.length){wrap.style.display="none";return;}
  wrap.style.display="";
  const hm=iso=>{const d=new Date(iso);return pad(d.getHours())+":"+pad(d.getMinutes());};
  const rows=sch.items.map((it,i)=> it.feasible
    ? `<div class="srow"><span class="rk">${i+1}</span>
        <span class="snm">${it.field_id} <small>${it.crop}</small></span>
        <span class="team">第 ${it.team} 隊</span><span class="tw">${hm(it.start)}→${hm(it.finish)}</span>
        <span class="ok">✓ 可完收</span></div>`
    : `<div class="srow bad"><span class="rk">${i+1}</span>
        <span class="snm">${it.field_id} <small>${it.crop}</small></span>
        <span class="no">✗ 來不及</span><div class="snote">${it.note||"人力/時間不足"}</div></div>`).join("");
  box.innerHTML=`<p class="sum">🗂 ${sch.summary||""}</p>${rows}`;
}
function hTick(){
  const now=Date.now();
  hTimers.forEach(tm=>{const cd=document.getElementById("cd"+tm.i);if(!cd)return;
    const cn=document.getElementById("cn"+tm.i), box=cd.closest(".count");
    let s=Math.max(0,Math.floor((tm.target-now)/1000));const h=Math.floor(s/3600);s%=3600;
    cd.textContent=pad(h)+":"+pad(Math.floor(s/60))+":"+pad(s%60);
    const hl=(tm.target-now)/3600e3; box.classList.toggle("soon",hl<12&&hl>0);
    const d=new Date(tm.target);
    cn.textContent="最晚 "+(d.getMonth()+1)+"/"+d.getDate()+" "+pad(d.getHours())+":"+pad(d.getMinutes())+" 前開始收";});
}
setInterval(hTick,1000);

/* ═══════════ 設定 UI ═══════════ */
function openSettings(){renderSettings();document.getElementById("modal").classList.add("on");}
function closeSettings(){document.getElementById("modal").classList.remove("on");}
function renderSettings(){
  applyFont();
  // 市場
  const ms=document.getElementById("mktSelect"); ms.innerHTML="";
  PRICES.markets.forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;
    if(m===MARKET)o.selected=true;ms.appendChild(o);});
  // 我的品項
  const wl=document.getElementById("watchList"); wl.innerHTML="";
  const watch=watchCrops();
  watch.forEach(disp=>{const row=document.createElement("div");row.className="witem";
    row.innerHTML=`<span class="wn">${disp}</span><button class="rm" data-c="${disp}">移除</button>`;
    wl.appendChild(row);});
  wl.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{
    let w=watchCrops().filter(c=>c!==b.dataset.c); S.setWatch(MARKET,w);
    renderSettings(); renderBoard(); if(CUR&&!w.includes(CUR)){CUR=null;document.getElementById("detail").innerHTML="";}});
  // 新增下拉（可加的品項）
  const addable=availableCrops().filter(c=>!watch.includes(c));
  const as=document.getElementById("addSelect"); as.innerHTML="";
  addable.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;as.appendChild(o);});
  document.getElementById("addBtn").disabled=!addable.length;
  if(!addable.length){const o=document.createElement("option");o.textContent="（已全部加入）";as.appendChild(o);}
}
document.getElementById("fsRow").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;S.fs=b.dataset.v;applyFont();});
document.getElementById("mktSelect").addEventListener("change",e=>{
  MARKET=e.target.value;S.market=MARKET;CUR=null;document.getElementById("detail").innerHTML="";
  renderBoard();renderSettings();});
document.getElementById("addBtn").addEventListener("click",()=>{
  const v=document.getElementById("addSelect").value;if(!v)return;
  const w=watchCrops();if(!w.includes(v)){w.push(v);S.setWatch(MARKET,w);}renderSettings();renderBoard();});
document.getElementById("gear").addEventListener("click",openSettings);
document.getElementById("closeSet").addEventListener("click",closeSettings);
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeSettings();});

/* ═══════════ 分頁 ═══════════ */
function switchTab(m){const isM=m==="market";
  document.getElementById("tab-market").classList.toggle("on",isM);
  document.getElementById("tab-harvest").classList.toggle("on",!isM);
  document.getElementById("view-market").classList.toggle("on",isM);
  document.getElementById("view-harvest").classList.toggle("on",!isM);}
document.getElementById("tab-market").addEventListener("click",()=>switchTab("market"));
document.getElementById("tab-harvest").addEventListener("click",()=>switchTab("harvest"));

/* ═══════════ 啟動 ═══════════ */
(async function(){
  applyFont();
  const {payload,live}=await loadPrices(); PRICES=payload;
  document.getElementById("updated").textContent="更新："+(payload.updated||"—");
  const mode=document.getElementById("mode");
  mode.className="badge "+(live?"live":"demo"); mode.textContent=live?"實際資料":"示範資料";
  MARKET=(S.market&&payload.markets.includes(S.market))?S.market:payload.markets[0];
  renderBoard();
  const list=watchCrops(); if(list.length) selectCrop(list[0]);
  try{ ADV=await loadAdvisory(); renderHarvest(); }catch(e){ ADV=makeAdvDemo(); renderHarvest(); }
})();
</script>
