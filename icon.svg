<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#34461F"/>
      <stop offset="1" stop-color="#141A0D"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#C6EA78"/>
      <stop offset="1" stop-color="#5AA036"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93DBD0"/>
      <stop offset="1" stop-color="#387167"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 田水：反光水田 -->
  <ellipse cx="256" cy="452" rx="196" ry="30" fill="url(#water)" opacity="0.45"/>
  <ellipse cx="256" cy="408" rx="150" ry="20" fill="url(#water)" opacity="0.26"/>
  <g stroke="#DEF4EF" stroke-width="5" stroke-linecap="round" opacity="0.6">
    <line x1="150" y1="452" x2="222" y2="452"/>
    <line x1="272" y1="460" x2="342" y2="460"/>
    <line x1="196" y1="431" x2="246" y2="431"/>
  </g>

  <!-- 秧苗：莖＋雙葉 -->
  <path d="M256 432 C256 362 256 300 256 232" fill="none" stroke="#4F9233" stroke-width="20" stroke-linecap="round"/>
  <path d="M256 302 C198 302 150 274 132 214 C196 206 244 238 256 302 Z" fill="url(#leaf)"/>
  <path d="M256 258 C312 234 348 174 340 108 C276 124 246 186 256 258 Z" fill="url(#leaf)"/>

  <!-- 水滴 -->
  <path d="M152 150 C152 150 130 180 130 197 a22 22 0 0 0 44 0 C174 180 152 150 152 150 Z" fill="url(#water)"/>
</svg>
