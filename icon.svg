<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0.15" y1="0.9" x2="0.85" y2="0.1">
      <stop offset="0" stop-color="#227a2e"/><stop offset="0.55" stop-color="#2f8a37"/><stop offset="1" stop-color="#57ad4d"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#aadd6b" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#c2e78a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#eaf6d8" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4a9e39"/><stop offset="1" stop-color="#8fd257"/>
    </linearGradient>
    <linearGradient id="leafR" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#5aad3e"/><stop offset="1" stop-color="#9bda5f"/>
    </linearGradient>
    <clipPath id="scope"><circle cx="256" cy="256" r="183"/></clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" fill="#ffffff"/>

  <!-- ===== inside the scope ===== -->
  <g clip-path="url(#scope)">
    <!-- radar sweep fan, upper-right -->
    <path d="M256 256 L223 71 A188 188 0 0 1 433 320 Z" fill="url(#sweep)"/>

    <!-- range arcs, upper-left (light gray) -->
    <g stroke="#b7c2b6" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
      <path d="M121 220 A140 140 0 0 1 232 118"/>
      <path d="M162 222 A100 100 0 0 1 230 159"/>
    </g>

    <!-- field: split dark-left / light-right, perspective -->
    <path d="M60 272 Q158 288 256 292 L256 460 L60 460 Z" fill="#2c7a35"/>
    <path d="M256 292 Q356 288 452 272 L452 460 L256 460 Z" fill="#8cc63f"/>
    <!-- furrows radiating from vanishing point + curved bands -->
    <g stroke="#f4f8ee" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.96">
      <path d="M256 292 L86 460"/>
      <path d="M256 292 L150 460"/>
      <path d="M256 292 L210 460"/>
      <path d="M256 292 L256 460"/>
      <path d="M256 292 L302 460"/>
      <path d="M256 292 L362 460"/>
      <path d="M256 292 L426 460"/>
      <path d="M112 356 Q256 330 400 356"/>
      <path d="M88 408 Q256 372 424 408"/>
    </g>
  </g>

  <!-- ===== radar ring + cardinal crosshair notches ===== -->
  <circle cx="256" cy="256" r="183" fill="none" stroke="url(#ring)" stroke-width="21"/>
  <g stroke="url(#ring)" stroke-width="21" stroke-linecap="butt">
    <line x1="256" y1="62" x2="256" y2="96"/>
    <line x1="62" y1="256" x2="96" y2="256"/>
    <line x1="416" y1="256" x2="450" y2="256"/>
  </g>

  <!-- ===== sprout: two leaves + stem ===== -->
  <path d="M256 250 C258 272 256 280 256 296" stroke="#2f7d32" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- left leaf (smaller, tips up-left) -->
  <path d="M256 256 C238 220 210 198 182 200 C186 236 214 260 253 262 Z" fill="url(#leaf)" stroke="#2f6b28" stroke-width="3.5"/>
  <path d="M252 260 C226 246 202 224 184 202" stroke="#e9f6d6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- right leaf (larger, brighter) -->
  <path d="M256 254 C282 218 322 198 356 206 C344 246 302 266 258 262 Z" fill="url(#leafR)" stroke="#2f6b28" stroke-width="3.5"/>
  <path d="M259 259 C300 246 330 226 352 208" stroke="#eefadd" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>
